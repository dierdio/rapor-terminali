<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tesis-62 // Rapor Terminali</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --green: #00ff41;
      --green-dim: #00a82a;
      --green-dark: #003d10;
      --green-glow: rgba(0, 255, 65, 0.12);
      --red: #ff2222;
      --red-dim: #8b0000;
      --amber: #ffb000;
      --amber-dim: #7a5200;
      --bg: #050a05;
      --bg2: #080f08;
      --bg3: #0a140a;
      --border: #1a3a1a;
      --text: #00ff41;
      --text-dim: #00a82a;
      --text-dark: #004d15;
      --hc: #9b2335;
      --hr: #e05252;
      --mr: #d4a017;
      --lr: #4caf50;
    }

    html,
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace
    }

    body {
      position: relative;
      overflow-x: hidden
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.07) 2px, rgba(0, 0, 0, 0.07) 4px);
      pointer-events: none;
      z-index: 9999
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0, 0, 0, 0.55) 100%);
      pointer-events: none;
      z-index: 9998
    }

    @keyframes blink {

      0%,
      50% {
        opacity: 1
      }

      51%,
      100% {
        opacity: 0
      }
    }

    @keyframes scanline {
      0% {
        top: -8%
      }

      100% {
        top: 108%
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .scanline {
      position: fixed;
      width: 100%;
      height: 36px;
      background: linear-gradient(transparent, rgba(0, 255, 65, 0.03), transparent);
      animation: scanline 7s linear infinite;
      pointer-events: none;
      z-index: 9997;
      top: 0;
      left: 0
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: var(--green);
      animation: blink .7s infinite;
      vertical-align: middle;
      margin-left: 2px
    }

    /* VERSİYON ROZET */
    .build-ver {
      position: fixed;
      bottom: 10px;
      right: 14px;
      font-size: 10px;
      color: var(--text-dark);
      letter-spacing: 2px;
      z-index: 10000;
      pointer-events: none;
      font-family: 'Share Tech Mono', monospace
    }
    .build-ver span { color: var(--green-dim) }

    /* HEADER */
    .hdr {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 10px 22px;
      position: sticky;
      top: 0;
      z-index: 100
    }

    .hdr-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px
    }

    .hdr-logo {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .scp-badge {
      font-family: 'VT323', monospace;
      font-size: 30px;
      color: var(--red);
      text-shadow: 0 0 10px var(--red);
      letter-spacing: 2px
    }

    .hdr-t {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px
    }

    .hdr-main {
      font-family: 'VT323', monospace;
      font-size: 20px;
      color: var(--green);
      letter-spacing: 2px;
      text-shadow: 0 0 8px var(--green)
    }

    .hdr-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px
    }

    .hdr-clock {
      font-size: 10px;
      color: var(--amber);
      letter-spacing: 1px
    }

    .hdr-user {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      color: var(--text-dim)
    }

    .sdot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 5px var(--green);
      display: inline-block;
      margin-right: 3px;
      animation: blink 2s infinite
    }

    .sdot.red {
      background: var(--red);
      box-shadow: 0 0 5px var(--red)
    }

    .logout-btn {
      background: none;
      border: 1px solid var(--red-dim);
      color: var(--red);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      padding: 3px 10px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all .15s
    }

    .logout-btn:hover {
      background: var(--red-dim);
      color: #fff
    }

    .hdr-status {
      display: flex;
      gap: 18px;
      font-size: 9px;
      color: var(--text-dark);
      letter-spacing: 1px
    }

    /* LAYOUT */
    .main-screen {
      display: none;
      min-height: 100vh;
      flex-direction: column
    }

    .main-screen.active {
      display: flex;
      animation: fadeIn .4s ease
    }

    .main-body {
      display: flex;
      flex: 1
    }

    .sidebar {
      width: 210px;
      min-width: 210px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      padding: 12px 0
    }

    .sb-label {
      font-size: 9px;
      color: var(--text-dark);
      letter-spacing: 2px;
      padding: 10px 14px 5px;
      border-bottom: 1px solid var(--border)
    }

    .sb-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      cursor: pointer;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 1px;
      border: none;
      background: none;
      text-align: left;
      width: 100%;
      border-left: 2px solid transparent;
      transition: all .12s;
      font-family: 'Share Tech Mono', monospace
    }

    .sb-item::before {
      content: '// ';
      color: var(--text-dark)
    }

    .sb-item:hover {
      background: var(--green-glow);
      color: var(--green);
      border-left-color: var(--green-dim)
    }

    .sb-item.active {
      background: var(--green-glow);
      color: var(--green);
      border-left: 2px solid var(--green)
    }

    .sb-item.active::before {
      color: var(--green)
    }

    .content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      background: var(--bg)
    }

    /* PAGE */
    .ph {
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px
    }

    .ph h2 {
      font-family: 'VT323', monospace;
      font-size: 26px;
      color: var(--green);
      letter-spacing: 2px
    }

    .ph h2::before {
      content: '>>> ';
      color: var(--text-dim)
    }

    .ph p {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      margin-top: 4px
    }

    /* FORM */
    .rf {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 20px;
      max-width: 720px
    }

    .fs {
      border-left: 2px solid var(--green-dark);
      padding-left: 14px;
      margin-bottom: 20px
    }

    .fs-title {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 3px;
      margin-bottom: 12px;
      text-transform: uppercase
    }

    .frow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    .fg {
      margin-bottom: 12px
    }

    .fg label {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      display: block;
      margin-bottom: 5px
    }

    .fg label::before {
      content: '[+] ';
      color: var(--green-dim)
    }

    .ts,
    .ta,
    .tn,
    .tin,
    .ttm {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--green-dark);
      border-left: 2px solid var(--green-dim);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      padding: 7px 10px;
      outline: none;
      transition: all .15s
    }

    .ts:focus,
    .ta:focus,
    .tn:focus,
    .tin:focus,
    .ttm:focus {
      border-color: var(--green);
      box-shadow: 0 0 8px rgba(0, 255, 65, 0.13)
    }

    .ts option {
      background: var(--bg2)
    }

    .ta {
      min-height: 90px;
      resize: vertical;
      line-height: 1.6
    }

    .tn {
      -moz-appearance: textfield
    }

    .tn::-webkit-outer-spin-button,
    .tn::-webkit-inner-spin-button {
      -webkit-appearance: none
    }

    /* TIMESTAMPS */
    .ts-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px
    }

    .ts-row {
      display: grid;
      grid-template-columns: 130px 1fr 28px;
      gap: 6px;
      align-items: center
    }

    .ts-t {
      background: var(--bg3);
      border: 1px solid var(--green-dark);
      border-left: 2px solid var(--amber-dim);
      color: var(--amber);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      padding: 6px 8px;
      outline: none;
      width: 100%
    }

    .ts-t:focus {
      border-color: var(--amber);
      box-shadow: 0 0 5px rgba(255, 176, 0, 0.12)
    }

    .ts-n {
      background: var(--bg3);
      border: 1px solid var(--green-dark);
      border-left: 2px solid var(--green-dim);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      padding: 6px 8px;
      outline: none;
      width: 100%
    }

    .ts-n:focus {
      border-color: var(--green);
      box-shadow: 0 0 5px rgba(0, 255, 65, 0.1)
    }

    .ts-rm {
      background: none;
      border: 1px solid var(--red-dim);
      color: var(--red);
      font-size: 12px;
      cursor: pointer;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .12s
    }

    .ts-rm:hover {
      background: var(--red-dim)
    }

    .add-ts {
      background: none;
      border: 1px solid var(--green-dark);
      color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      padding: 5px 12px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all .12s
    }

    .add-ts:hover {
      border-color: var(--green);
      color: var(--green)
    }

    .add-ts::before {
      content: '[+] '
    }

    /* IMAGES */
    .img-area {
      border: 1px dashed var(--green-dark);
      padding: 14px;
      text-align: center;
      cursor: pointer;
      transition: all .15s;
      background: var(--bg3)
    }

    .img-area:hover {
      border-color: var(--green);
      background: var(--green-glow)
    }

    .img-area input {
      display: none
    }

    .img-lbl {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      cursor: pointer;
      display: block
    }

    .img-lbl::before {
      content: '[UPLOAD] ';
      color: var(--green-dim)
    }

    .img-prev {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px
    }

    .img-th {
      position: relative;
      width: 80px;
      height: 60px;
      border: 1px solid var(--green-dark);
      overflow: hidden
    }

    .img-th img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.3) brightness(0.8)
    }

    .img-th:hover img {
      filter: none
    }

    .img-th-rm {
      position: absolute;
      top: 0;
      right: 0;
      background: rgba(139, 0, 0, 0.85);
      color: var(--red);
      border: none;
      font-size: 10px;
      cursor: pointer;
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center
    }

    /* BUTTONS */
    .sub-btn {
      background: var(--green-dark);
      border: 1px solid var(--green);
      color: var(--green);
      font-family: 'VT323', monospace;
      font-size: 22px;
      padding: 9px 28px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all .2s;
      margin-top: 10px
    }

    .sub-btn:hover {
      background: var(--green);
      color: var(--bg);
      box-shadow: 0 0 18px rgba(0, 255, 65, 0.35)
    }

    .suc {
      display: none;
      background: rgba(0, 61, 16, 0.5);
      border: 1px solid var(--green-dim);
      color: var(--green);
      font-size: 11px;
      padding: 10px 14px;
      margin-bottom: 14px;
      letter-spacing: 1px;
      max-width: 720px
    }

    .suc::before {
      content: '[SİSTEM] '
    }

    /* CARDS */
    .rlist {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 820px
    }

    .rc {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--green-dim);
      padding: 14px 16px;
      transition: border-color .12s
    }

    .rc:hover {
      border-left-color: var(--green);
      box-shadow: 0 0 10px rgba(0, 255, 65, 0.04)
    }

    .rc-hdr {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 5px;
      gap: 12px
    }

    .rc-id {
      font-family: 'VT323', monospace;
      font-size: 20px;
      color: var(--green);
      letter-spacing: 1px
    }

    .rc-meta {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      margin-top: 2px
    }

    .rc-scp {
      font-size: 10px;
      color: var(--amber);
      border: 1px solid var(--amber-dim);
      padding: 2px 8px;
      letter-spacing: 1px;
      white-space: nowrap
    }

    .rc-body {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.6;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border)
    }

    .exp-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      padding: 3px 10px;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 1px;
      transition: all .12s
    }

    .exp-btn:hover {
      border-color: var(--green);
      color: var(--green)
    }

    /* FOLDERS */
    .fgrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 10px;
      max-width: 820px
    }

    .fi {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 14px;
      cursor: pointer;
      transition: all .12s;
      text-align: center
    }

    .fi:hover {
      border-color: var(--green);
      box-shadow: 0 0 10px rgba(0, 255, 65, 0.08)
    }

    .fi-icon {
      font-family: 'VT323', monospace;
      font-size: 28px;
      color: var(--green-dim);
      display: block;
      margin-bottom: 6px
    }

    .fi-name {
      font-size: 11px;
      color: var(--text);
      letter-spacing: 1px
    }

    .fi-count {
      font-size: 9px;
      color: var(--text-dim);
      margin-top: 3px;
      letter-spacing: 1px
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      padding: 0 0 12px;
      letter-spacing: 1px;
      display: inline-flex;
      align-items: center;
      gap: 5px
    }

    .back-btn::before {
      content: '<< '
    }

    .back-btn:hover {
      color: var(--green)
    }

    /* STATS */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
      max-width: 720px
    }

    .sc {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 12px;
      text-align: center
    }

    .sn {
      font-family: 'VT323', monospace;
      font-size: 34px;
      color: var(--green);
      text-shadow: 0 0 10px rgba(0, 255, 65, 0.25)
    }

    .sl {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 2px;
      margin-top: 2px
    }

    /* EMPTY */
    .empty {
      text-align: center;
      padding: 50px;
      color: var(--text-dark);
      font-size: 11px;
      letter-spacing: 2px
    }

    .empty::before {
      content: '[NULL] '
    }

    /* MODAL */
    .mo {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px
    }

    .mo.active {
      display: flex
    }

    .mb {
      background: var(--bg2);
      border: 1px solid var(--green);
      max-width: 740px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 0 40px rgba(0, 255, 65, 0.12)
    }

    .mh {
      background: var(--green-dark);
      border-bottom: 1px solid var(--green-dim);
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0
    }

    .mt {
      font-family: 'VT323', monospace;
      font-size: 20px;
      color: var(--green);
      letter-spacing: 2px
    }

    .mc {
      background: none;
      border: 1px solid var(--red-dim);
      color: var(--red);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      padding: 3px 10px;
      cursor: pointer
    }

    .mc:hover {
      background: var(--red-dim)
    }

    .mbody {
      padding: 20px;
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.8
    }

    .mf {
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px
    }

    .mfl {
      font-size: 9px;
      color: var(--text-dark);
      letter-spacing: 2px;
      margin-bottom: 4px
    }

    .mfv {
      color: var(--green);
      font-size: 12px
    }

    .mfp {
      color: var(--text-dim);
      font-size: 11px;
      line-height: 1.7;
      white-space: pre-wrap
    }

    .mts {
      display: flex;
      gap: 12px;
      margin-bottom: 4px;
      font-size: 11px
    }

    .mts-t {
      color: var(--amber);
      min-width: 100px
    }

    .mimgs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px
    }

    .mimg {
      max-width: 200px;
      max-height: 140px;
      border: 1px solid var(--green-dark);
      filter: saturate(0.4)
    }

    .mimg:hover {
      filter: none;
      border-color: var(--green);
      cursor: zoom-in
    }

    /* VALİDASYON */
    .field-err {
      border-color: var(--red) !important;
      box-shadow: 0 0 8px rgba(255, 34, 34, 0.2) !important
    }

    .val-msg {
      display: none;
      font-size: 9px;
      color: var(--red);
      letter-spacing: 1px;
      margin-top: 4px
    }

    .val-msg::before {
      content: '[!] '
    }

    .val-msg.show {
      display: block
    }

    .form-err-box {
      display: none;
      background: rgba(139, 0, 0, 0.12);
      border: 1px solid var(--red-dim);
      padding: 10px 14px;
      margin-bottom: 14px;
      font-size: 10px;
      color: var(--red);
      letter-spacing: 1px;
      line-height: 1.8
    }

    .form-err-box::before {
      content: '[HATA] ZORUNLU ALANLAR EKSİK:\A';
      white-space: pre;
      font-size: 9px;
      color: var(--red-dim)
    }

    .form-err-box.show {
      display: block
    }

    .onay-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 9px;
      letter-spacing: 1px;
      padding: 2px 8px;
      border: 1px solid
    }

    .onay-bekliyor {
      color: var(--amber);
      border-color: var(--amber-dim);
      background: rgba(255, 176, 0, 0.06)
    }

    .onay-onaylandi {
      color: var(--lr);
      border-color: #2e7d32;
      background: rgba(76, 175, 80, 0.06)
    }

    .onay-reddedildi {
      color: var(--red);
      border-color: var(--red-dim);
      background: rgba(139, 0, 0, 0.1)
    }

    .onay-btn-grp {
      display: flex;
      gap: 6px;
      margin-top: 10px
    }

    .onay-btn {
      background: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      padding: 4px 12px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all .15s;
      border: 1px solid
    }

    .onay-btn.onayla {
      color: var(--lr);
      border-color: #2e7d32
    }

      const mapped = dbToRap(data);

    async function updateRap(id, fields) {
      const { error } = await _supabase.from('raporlar').update(fields).eq('id', id);
      if (!error) { const i = ALL_RAPS.findIndex(x => x.id === id); if (i >= 0) Object.assign(ALL_RAPS[i], fields); }

      const panel = document.getElementById('holo-panel');

      const name  = document.getElementById('holo-name');
      const rutbe = document.getElementById('holo-rutbe');
      const idEl  = document.getElementById('holo-id');

      name.textContent  = profile.displayName;
      rutbe.textContent = profile.rutbe;

      if (profile.robloxId) {
        idEl.textContent = 'RBX-ID: ' + profile.robloxId;
        // Roblox thumbnail API (CORS açık)
        try {
          const res = await fetch(
            'https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=' +
            profile.robloxId + '&size=150x150&format=Png&isCircular=false'
          );
          const json = await res.json();
          const url  = json?.data?.[0]?.imageUrl;
          if (url) img.src = url;
          else img.src = '';
        } catch(e) { img.src = ''; }
      } else {
        idEl.textContent = 'RBX-ID: TANIMLI DEĞİL';
        img.src = '';
      }

      panel.style.display = 'flex';
    }

    function setNav(id) {
      document.querySelectorAll('.sb-item').forEach(e => e.classList.remove('active'));
      const el = document.getElementById('nav-' + id); if (el) el.classList.add('active');
    }

    function showPage(id) {
      VF = null; imgs = []; tsc = 0; setNav(id);
      const ca = document.getElementById('ca');
      if (id === 'rapor-yaz') ca.innerHTML = bRaporYaz();
      else if (id === 'raporlarim') ca.innerHTML = bRaporlarim();
      else if (id === 'tum-raporlar') ca.innerHTML = bTumRaporlar();
      else if (id === 'dosyalar') ca.innerHTML = bDosyalar();
      else if (id === 'gunluk-yaz') ca.innerHTML = bGunlukYaz();
      else if (id === 'gunluk-raporlarim') ca.innerHTML = bGunlukRaporlarim();
      else if (id === 'tum-gunluk') ca.innerHTML = bTumGunluk();
    }

    // S2 rütbesi kontrolü: Araştırmacı Adayı-S2, Uzman Stajyer-S2, Stajyer-S2
    function isS2() { return CU && CU.rutbeKat === 'lr'; }
    function isS1() { return CU && CU.rutbe && CU.rutbe.includes('S1'); }

    function scpOpts() {
      let h = '<option value="">-- SCP SEÇ --</option>';
      SCP_LIST.forEach(s => {
        if (isS2() && s.s !== 'Sektör 2') return; // S2 sadece Sektör 2
        h += `<optgroup label="[ ${s.s} ]">`;
        s.i.forEach(i => h += `<option value="${i}">${i}</option>`);
        h += `</optgroup>`;
      });
      return h;
    }
    function scdOpts() {
      let h = '<option value="">-- DENEY KODU SEÇ --</option>';
      SCD_LIST.forEach(s => {
        if (isS2() && s.s !== 'Sektör 2') return; // S2 sadece Sektör 2
        h += `<optgroup label="[ ${s.s} ]">`;
        s.i.forEach(i => h += `<option value="${i}">${i}</option>`);
        h += `</optgroup>`;
      });
      return h;
    }
    function rutbeOpts() {
      let h = '<option value="">-- RÜTBE SEÇ --</option>';
      RUTBE_LIST.forEach(r => {
        if (r.disabled) h += `<option disabled style="color:${RC[r.kat]};font-weight:bold;background:#080f08">${r.label}</option>`;
        else h += `<option value="${r.label}" style="color:${RC[r.kat]};background:#080f08">${r.label}</option>`;
      });
      return h;
    }

    function bRaporYaz() {
      // S1 rütbesi rapor yazamaz
      if (isS1()) {
        return `<div><div class="ph"><h2>YENİ DENEY RAPORU</h2><p>// ERİŞİM KISITLAMASI</p></div>
  <div style="background:rgba(139,0,0,.12);border:1px solid var(--red-dim);padding:20px;max-width:600px;text-align:center">
    <div style="font-family:'VT323',monospace;font-size:24px;color:var(--red);letter-spacing:3px;margin-bottom:10px">⚠ ERİŞİM REDDEDİLDİ</div>
    <div style="font-size:11px;color:var(--text-dim);letter-spacing:1px;line-height:1.8">Seviye-1 (S1) personeli deney raporu oluşturma yetkisine sahip değildir.<br>Rapor yazabilmek için en az S2 yetki seviyesi gerekmektedir.</div>
  </div></div>`;
      }
      const nextNo = fmtNo(userRapCount(CU.username) + 1);
      // Rütbeyi profilden otomatik doldur
      const autoRutbe = CU.rutbe || '';
      const rutbeColor = CU.rutbeKat ? (RC[CU.rutbeKat] || 'var(--green)') : 'var(--green)';
      return `<div>
  <div class="ph"><h2>YENİ DENEY RAPORU</h2><p>// TÜM ALANLAR GİZLİLİK SEVİYESİ-4 KAPSAMINDADIR</p></div>
  <div class="suc" id="suc">RAPOR BAŞARIYLA SİSTEME İLETİLDİ. KAYIT OLUŞTURULDU.</div>
  <div class="form-err-box" id="form-err"></div>
  <div class="rf">
    <div class="fs">
      <div class="fs-title">// TEMEL BİLGİLER</div>
      <div class="frow">
        <div class="fg"><label>DENEY KODU</label><select class="ts" id="r-scd">${scdOpts()}</select><span class="val-msg" id="err-scd">Deney kodu seçilmelidir.</span></div>
        <div class="fg"><label>DENEY NUMARASI</label><input type="text" class="tin" value="${nextNo}" readonly style="color:var(--amber);border-left-color:var(--amber-dim)"/></div>
      </div>
      <div class="frow">
        <div class="fg"><label>SCP</label><select class="ts" id="r-scp">${scpOpts()}</select><span class="val-msg" id="err-scp">SCP seçilmelidir.</span></div>
        <div class="fg"><label>DENEY SORUMLUSU</label><input type="text" class="tin" id="r-sor" placeholder="Kod Adı"/><span class="val-msg" id="err-sor">Deney sorumlusu girilmelidir.</span></div>
      </div>
      <div class="fg"><label>PERSONEL RÜTBESİ</label><input type="text" class="tin" id="r-rutbe" value="${autoRutbe}" readonly style="color:${rutbeColor};border-left-color:${rutbeColor};opacity:.85" title="Rütbeniz profilinizden otomatik alınmaktadır"/><span class="val-msg" id="err-rutbe">Rütbe bulunamadı.</span></div>
      <div class="frow">
        <div class="fg"><label>BAŞLANGIÇ ZAMANI</label><input type="time" class="ttm" id="r-zb"/><span class="val-msg" id="err-zb">Başlangıç zamanı girilmelidir.</span></div>
        <div class="fg"><label>BİTİŞ ZAMANI</label><input type="time" class="ttm" id="r-ze"/><span class="val-msg" id="err-ze">Bitiş zamanı girilmelidir.</span></div>
      </div>
      <div class="fg"><label>KULLANILAN SINIF-D SAYISI</label><input type="number" class="tn" id="r-sd" placeholder="0" min="0"/><span class="val-msg" id="err-sd">Sınıf-D sayısı girilmelidir.</span></div>
    </div>
    <div class="fs">
      <div class="fs-title">// DENEY DETAYLARI</div>
      <div class="fg"><label>DENEY AMACI</label><textarea class="ta" id="r-amac" placeholder="Deneyin amacını açıklayın..."></textarea><span class="val-msg" id="err-amac">Deney amacı girilmelidir.</span></div>
      <div class="fg"><label>DENEY SONUCU</label><textarea class="ta" id="r-sonuc" placeholder="Deney sonuçlarını detaylıca açıklayın..."></textarea><span class="val-msg" id="err-sonuc">Deney sonucu girilmelidir.</span></div>
    </div>
    <div class="fs">
      <div class="fs-title">// ZAMAN DAMGALARI</div>
      <div class="ts-list" id="tsl"></div>
      <button class="add-ts" onclick="addTs()">ZAMAN DAMGASI EKLE</button>
    </div>
    <div class="fs">
      <div class="fs-title">// ANOMALİLER & EK BİLGİLER</div>
      <div class="fg"><label>DENEYDE YAŞANAN ANORMAL DURUMLAR</label><textarea class="ta" id="r-ano" placeholder="Gözlemlenen anormal durumları belirtin..."></textarea></div>
      <div class="fg"><label>EKLEMELERİM</label><textarea class="ta" id="r-ek" placeholder="Eklemek istediğiniz ek notlar..."></textarea></div>
    </div>
    <div class="fs">
      <div class="fs-title">// GÖRSELLER</div>
      <div class="img-area" onclick="document.getElementById('img-in').click()">
        <input type="file" id="img-in" accept="image/*" multiple onchange="handleImgs(event)"/>
        <label class="img-lbl">GÖRSEL DOSYASI YÜKLEYİN (JPG, PNG, GIF)</label>
        <div class="img-prev" id="imgprev"></div>
      </div>
    </div>
    <button class="sub-btn" onclick="gonder()">[ RAPORU GÖNDER ]</button>
  </div></div>`;
    }

    function upRutbeClr() {
      const sel = document.getElementById('r-rutbe'); if (!sel) return;
      const f = RUTBE_LIST.find(r => r.label === sel.value);
      sel.style.color = f ? RC[f.kat] || 'var(--green)' : 'var(--green)';
    }

    function addTs() {
      const list = document.getElementById('tsl'); if (!list) return;
      const id = 'ts' + Date.now(); tsc++;
      const div = document.createElement('div');
      div.className = 'ts-row'; div.id = id;
      div.innerHTML = `<input type="text" class="ts-t" placeholder="00:00:00" maxlength="8"/><input type="text" class="ts-n" placeholder="Olay açıklaması..."/><button class="ts-rm" onclick="rmTs('${id}')">✕</button>`;
      list.appendChild(div);
    }
    function rmTs(id) { const el = document.getElementById(id); if (el) { el.remove(); tsc-- } }
    function getTs() {
      return Array.from(document.querySelectorAll('.ts-row')).map(r => ({ time: r.querySelector('.ts-t').value.trim(), note: r.querySelector('.ts-n').value.trim() })).filter(t => t.time || t.note);
    }

    function handleImgs(e) {
      Array.from(e.target.files).forEach(f => {
        const r = new FileReader();
        r.onload = ev => { imgs.push(ev.target.result); renderImgs() };
        r.readAsDataURL(f);
      });
    }
    function renderImgs() {
      const p = document.getElementById('imgprev'); if (!p) return;
      p.innerHTML = imgs.map((s, i) => `<div class="img-th"><img src="${s}"/><button class="img-th-rm" onclick="rmImg(${i})">✕</button></div>`).join('');
    }
    function rmImg(i) { imgs.splice(i, 1); renderImgs() }

    async function gonder() {
      ['r-scd', 'r-scp', 'r-sor', 'r-zb', 'r-ze', 'r-sd', 'r-amac', 'r-sonuc'].forEach(id => {
        const el = document.getElementById(id); if (el) el.classList.remove('field-err');
      });
      document.querySelectorAll('.val-msg').forEach(e => e.classList.remove('show'));
      document.getElementById('form-err').classList.remove('show');

      const alanlar = [
        { id: 'r-scd', errId: 'err-scd', label: 'Deney Kodu' },
        { id: 'r-scp', errId: 'err-scp', label: 'SCP' },
        { id: 'r-sor', errId: 'err-sor', label: 'Deney Sorumlusu' },
        { id: 'r-zb', errId: 'err-zb', label: 'Başlangıç Zamanı' },
        { id: 'r-ze', errId: 'err-ze', label: 'Bitiş Zamanı' },
        { id: 'r-sd', errId: 'err-sd', label: 'Sınıf-D Sayısı' },
        { id: 'r-amac', errId: 'err-amac', label: 'Deney Amacı' },
        { id: 'r-sonuc', errId: 'err-sonuc', label: 'Deney Sonucu' },
      ];
      const eksikler = [];
      alanlar.forEach(a => {
        const el = document.getElementById(a.id); if (!el) return;
        if (!el.value.trim()) {
          el.classList.add('field-err');
          const em = document.getElementById(a.errId); if (em) em.classList.add('show');
          eksikler.push(a.label);
        }
      });
      if (eksikler.length) {
        const box = document.getElementById('form-err');
        box.innerHTML = eksikler.map(l => `• ${l}`).join('<br>');
        box.classList.add('show');
        box.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }

      const btn = document.querySelector('#ca .sub-btn');
      if (btn) { btn.disabled = true; btn.textContent = '[ GÖNDERİLİYOR... ]'; }

      const saved = await insertRap({
        username: CU.username, displayName: CU.displayName,
        dNo: fmtNo(userRapCount(CU.username) + 1),
        scd: document.getElementById('r-scd').value,
        scp: document.getElementById('r-scp').value,
        sorumlu: document.getElementById('r-sor').value.trim(),
        rutbe: CU.rutbe || '',
        zb: document.getElementById('r-zb').value,
        ze: document.getElementById('r-ze').value,
        sd: document.getElementById('r-sd').value,
        amac: document.getElementById('r-amac').value.trim(),
        sonuc: document.getElementById('r-sonuc').value.trim(),
        ano: document.getElementById('r-ano').value.trim(),
        ek: document.getElementById('r-ek').value.trim(),
        timestamps: getTs(), images: [...imgs]
      });

      if (btn) { btn.disabled = false; btn.textContent = '[ RAPORU GÖNDER ]'; }
      if (!saved) { alert('Kayıt hatası, lütfen tekrar deneyin.'); return; }

      ['r-scd', 'r-scp', 'r-sor', 'r-zb', 'r-ze', 'r-sd', 'r-amac', 'r-sonuc', 'r-ano', 'r-ek'].forEach(id => { const el = document.getElementById(id); if (el) el.value = '' });
      document.getElementById('tsl').innerHTML = ''; imgs = []; tsc = 0; renderImgs();
      const s = document.getElementById('suc'); s.style.display = 'block';
      setTimeout(() => s.style.display = 'none', 4000);
      const ro = document.querySelector('.tin[style*="amber"]'); if (ro) ro.value = fmtNo(userRapCount(CU.username) + 1);
    }

    function bRaporlarim() {
      const raps = getRaps().filter(r => r.username === CU.username);
      let h = `<div><div class="ph"><h2>RAPORLARIM</h2><p>// ${raps.length} KAYIT BULUNDU</p></div><div class="rlist">`;
      if (!raps.length) h += `<div class="empty">VERİ BULUNAMADI. RAPOR GÖNDERİLMEMİŞ.</div>`;
      else raps.slice().reverse().forEach(r => h += rCard(r, false));
      return h + `</div></div>`;
    }

    function bTumRaporlar() {
      const raps = getRaps();
      const users = [...new Set(raps.map(r => r.username))].length;
      let h = `<div><div class="ph"><h2>TÜM RAPORLAR</h2><p>// SİSTEMDEKİ TÜM DENEY KAYITLARI</p></div>
  <div class="stats">
    <div class="sc"><div class="sn">${raps.length}</div><div class="sl">TOPLAM RAPOR</div></div>
    <div class="sc"><div class="sn">${users}</div><div class="sl">PERSONEL</div></div>
    <div class="sc"><div class="sn">${[...new Set(raps.map(r => r.scp))].length}</div><div class="sl">FARKLI SCP</div></div>
    <div class="sc"><div class="sn">${raps.reduce((a, r) => a + (parseInt(r.sd) || 0), 0)}</div><div class="sl">TOPLAM SINIF-D</div></div>
  </div><div class="rlist">`;
      if (!raps.length) h += `<div class="empty">VERİ BULUNAMADI.</div>`;
      else raps.slice().reverse().forEach(r => h += rCard(r, true));
      return h + `</div></div>`;
    }

    function rCard(r, su) {
      return `<div class="rc">
    <div class="rc-hdr">
      <div>
        <div class="rc-id">${r.scd || '—'} // DENEY-${r.dNo || '000'}</div>
        <div class="rc-meta">${su ? `<span style="color:var(--green)">${r.displayName}</span> · ` : ''}<span style="color:${RC[RUTBE_LIST.find(x => x.label === r.rutbe)?.kat] || 'var(--text-dim)'}">${r.rutbe || '—'}</span> · ${r.tarih}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <span class="rc-scp">${r.scp ? r.scp.split('–')[0].trim() : '—'}</span>
        ${onayDurumBadge(r.onayDurum)}
      </div>
    </div>
    <div class="rc-body">${r.amac ? r.amac.substring(0, 120) + '…' : ''}</div>
    <div style="display:flex;gap:6px;margin-top:8px">
      <button class="exp-btn" onclick="openMo(${r.id})">[ TAM RAPORU GÖRÜNTÜLE ]</button>
      ${(CU.role === 'yetkili' || CU.username === r.username) ? `<button class="sil-btn" onclick="silRapor(${r.id})">[ SİL ]</button>` : ''}
    </div>
  </div>`;
    }

    function bDosyalar() {
      const raps = getRaps();
      const yetk = ALL_PROFILES.filter(u => u.role === 'yetkisiz');
      if (VF) {
        const u = ALL_PROFILES.find(x => x.username === VF);
        const ur = raps.filter(r => r.username === VF);
        let h = `<div><button class="back-btn" onclick="VF=null;setNav('dosyalar');document.getElementById('ca').innerHTML=bDosyalar()">PERSONEL DOSYALARINA DÖN</button>
    <div class="ph"><h2>${u ? u.displayName.toUpperCase() : VF} // DOSYA</h2><p>// ${ur.length} RAPOR KAYDI</p></div><div class="rlist">`;
        if (!ur.length) h += `<div class="empty">VERİ BULUNAMADI.</div>`;
        else ur.slice().reverse().forEach(r => h += rCard(r, false));
        return h + `</div></div>`;
      }
      let h = `<div><div class="ph"><h2>PERSONEL DOSYALARI</h2><p>// YETKİSİZ PERSONEL DENEY ARŞİVLERİ</p></div><div class="fgrid">`;
      yetk.forEach(u => {
        const c = raps.filter(r => r.username === u.username).length;
        h += `<div class="fi" onclick="openFolder('${u.username}')"><span class="fi-icon">[DIR]</span><div class="fi-name">${u.displayName}</div><div class="fi-count">${c} RAPOR KAYDI</div></div>`;
      });
      return h + `</div></div>`;
    }

    function openFolder(u) { VF = u; document.getElementById('ca').innerHTML = bDosyalar() }

    function openMo(id) {
      const r = getRaps().find(x => x.id === id); if (!r) return;
      openModalId = id;
      openGModalId = null; // günlük modal sıfırla
      const silBtn = document.getElementById('mo-sil-btn');
      if (silBtn) {
        silBtn.onclick = () => silFromModal();
        silBtn.style.display = (CU.role === 'yetkili' || CU.username === r.username) ? 'block' : 'none';
      }
      document.getElementById('mt').textContent = `${r.scd || '—'} // DENEY-${r.dNo || '000'}`;
      const rk = RUTBE_LIST.find(x => x.label === r.rutbe);
      const rc = rk ? RC[rk.kat] || 'var(--green)' : 'var(--green)';
      let b = `
    <div class="mf"><div class="mfl">DENEY KODU / NUMARA</div><div class="mfv">${r.scd || '—'} &nbsp;|&nbsp; DENEY-${r.dNo || '000'}</div></div>
    <div class="mf"><div class="mfl">SCP</div><div class="mfv">${r.scp || '—'}</div></div>
    <div class="mf"><div class="mfl">DENEY SORUMLUSU</div><div class="mfv">${r.sorumlu || '—'}</div></div>
    <div class="mf"><div class="mfl">PERSONEL RÜTBESİ</div><div class="mfv" style="color:${rc}">${r.rutbe || '—'}</div></div>
    <div class="mf"><div class="mfl">ZAMAN</div><div class="mfv">${r.zb || '--:--'} → ${r.ze || '--:--'}</div></div>
    <div class="mf"><div class="mfl">KULLANILAN SINIF-D</div><div class="mfv">${r.sd || '0'} KİŞİ</div></div>
    <div class="mf"><div class="mfl">RAPOR TARİHİ</div><div class="mfv">${r.tarih}</div></div>
    <div class="mf"><div class="mfl">// DENEY AMACI</div><div class="mfp">${r.amac || '—'}</div></div>
    <div class="mf"><div class="mfl">// DENEY SONUCU</div><div class="mfp">${r.sonuc || '—'}</div></div>`;
      if (r.timestamps?.length) {
        b += `<div class="mf"><div class="mfl">// ZAMAN DAMGALARI</div>`;
        r.timestamps.forEach(t => b += `<div class="mts"><span class="mts-t">[${t.time || '--:--:--'}]</span><span>${t.note || ''}</span></div>`);
        b += `</div>`;
      }
      b += `<div class="mf"><div class="mfl">// ANORMAL DURUMLAR</div><div class="mfp">${r.ano || 'Kayıt yok.'}</div></div>`;
      b += `<div class="mf"><div class="mfl">// EKLEMELERİM</div><div class="mfp">${r.ek || 'Kayıt yok.'}</div></div>`;
      // Onay durumu
      b += `<div class="mf"><div class="mfl">// ONAY DURUMU</div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:4px">
      ${onayDurumBadge(r.onayDurum)}
      ${r.onayYapan ? `<span style="font-size:10px;color:var(--text-dim)">— ${r.onayYapan} · ${r.onayTarih}</span>` : ''}
    </div>
    ${CU.role === 'yetkili' ? `<div class="onay-btn-grp">
      <button class="onay-btn onayla" onclick="onaylaRapor(${r.id})">[ ✓ ONAYLA ]</button>
      <button class="onay-btn reddet" onclick="reddetRapor(${r.id})">[ ✕ REDDET ]</button>
    </div>`: ''}
  </div>`;
      if (r.images?.length) {
        b += `<div class="mf"><div class="mfl">// GÖRSELLER</div><div class="mimgs">`;
        r.images.forEach(s => b += `<img src="${s}" class="mimg" onclick="openLb('${s}')" title="Büyütmek için tıkla"/>`);
        b += `</div></div>`;
      }
      document.getElementById('mbody').innerHTML = b;
      document.getElementById('mo').classList.add('active');
    }
    function openLb(src) {
      document.getElementById('lb-img').src = src;
      document.getElementById('lb').classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeLb() {
      document.getElementById('lb').classList.remove('active');
      document.getElementById('lb-img').src = '';
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb() });

    function onayDurumBadge(durum) {
      if (durum === 'onaylandi') return `<span class="onay-badge onay-onaylandi">✓ ONAYLANDI</span>`;
      if (durum === 'reddedildi') return `<span class="onay-badge onay-reddedildi">✕ REDDEDİLDİ</span>`;
      return `<span class="onay-badge onay-bekliyor">◎ ONAY BEKLİYOR</span>`;
    }

    async function onaylaRapor(id) {
      const fields = { onay_durum: 'onaylandi', onay_yapan: CU.displayName, onay_tarih: new Date().toLocaleString('tr-TR') };
      await updateRap(id, fields);
      openMo(id);
      document.getElementById('ca').innerHTML = CU.role === 'yetkili' ? (document.getElementById('nav-tum-raporlar')?.classList.contains('active') ? bTumRaporlar() : bDosyalar()) : bRaporlarim();
    }

    async function reddetRapor(id) {
      const fields = { onay_durum: 'reddedildi', onay_yapan: CU.displayName, onay_tarih: new Date().toLocaleString('tr-TR') };
      await updateRap(id, fields);
      openMo(id);
      document.getElementById('ca').innerHTML = CU.role === 'yetkili' ? (document.getElementById('nav-tum-raporlar')?.classList.contains('active') ? bTumRaporlar() : bDosyalar()) : bRaporlarim();
    }

    // ============ GÜNLÜK RAPOR SİSTEMİ ============
    let gimgs = []; // günlük rapor görselleri

    // getGRaps ve saveGRaps → CRUD fonksiyonları yukarıda tanımlandı
    function userGRapCount(u) { return getGRaps().filter(r => r.username === u).length }

    function bGunlukYaz() {
      const nextNo = fmtNo(userGRapCount(CU.username) + 1);
      const autoRutbe = CU.rutbe || '';
      const rutbeColor = CU.rutbeKat ? (RC[CU.rutbeKat] || 'var(--green)') : 'var(--green)';
      return `<div>
  <div class="ph"><h2>YENİ GÜNLÜK RAPOR</h2><p>// GÜNLÜK MESAİ VE AKTİVİTE KAYDI</p></div>
  <div class="suc" id="gsuc">GÜNLÜK RAPOR BAŞARIYLA SİSTEME İLETİLDİ.</div>
  <div class="form-err-box" id="gform-err"></div>
  <div class="rf">
    <div class="fs">
      <div class="fs-title">// PERSONEL BİLGİLERİ</div>
      <div class="frow">
        <div class="fg"><label>ROBLOX TAKMA ADIM</label><input type="text" class="tin" id="g-roblox" placeholder="Roblox kullanıcı adınız"/><span class="val-msg" id="gerr-roblox">Roblox takma adı girilmelidir.</span></div>
        <div class="fg"><label>GÜNLÜK RAPOR NO</label><input type="text" class="tin" value="${nextNo}" readonly style="color:var(--amber);border-left-color:var(--amber-dim)"/></div>
      </div>
      <div class="fg"><label>MEVCUT RÜTBEMم</label><input type="text" class="tin" id="g-rutbe" value="${autoRutbe}" readonly style="color:${rutbeColor};border-left-color:${rutbeColor};opacity:.85" title="Rütbeniz profilinizden otomatik alınmaktadır"/></div>
    </div>
    <div class="fs">
      <div class="fs-title">// AKTİVİTE KAYDI</div>
      <div class="fg"><label>YAPTIĞIM DENEYLER</label><textarea class="ta" id="g-deneyler" placeholder="- SCP-xxx ile deney&#10;- SCP-yyy ile deney"></textarea><span class="val-msg" id="gerr-deneyler">Yapılan deneyler girilmelidir.</span></div>
      <div class="fg"><label>MESAİDE GEÇİRDİĞİM SÜRE</label><input type="text" class="tin" id="g-sure" placeholder="Örn: 45 dakika, 1 saat 30 dk"/><span class="val-msg" id="gerr-sure">Mesai süresi girilmelidir.</span></div>
    </div>
    <div class="fs">
      <div class="fs-title">// GÖRSELLER</div>
      <div class="fg">
        <label>MESAİDEN GÖRSELLER</label>
        <div class="img-area" onclick="document.getElementById('g-mesai-in').click()" style="margin-bottom:8px">
          <input type="file" id="g-mesai-in" accept="image/*" multiple onchange="handleGImgs(event,'mesai')"/>
          <label class="img-lbl">MESAİ GÖRSELLERİ YÜKLEYİN</label>
          <div class="img-prev" id="gmesaiprev"></div>
        </div>
      </div>
      <div class="fg">
        <label>DENEY İÇİNDEN GÖRSELLER</label>
        <div class="img-area" onclick="document.getElementById('g-deney-in').click()">
          <input type="file" id="g-deney-in" accept="image/*" multiple onchange="handleGImgs(event,'deney')"/>
          <label class="img-lbl">DENEY GÖRSELLERİ YÜKLEYİN</label>
          <div class="img-prev" id="gdeneyprev"></div>
        </div>
      </div>
    </div>
    <div class="fs">
      <div class="fs-title">// EK BİLGİLER</div>
      <div class="fg"><label>EKLEMEK İSTEDİKLERİM</label><textarea class="ta" id="g-ekler" placeholder="Eklemek istediğiniz notlar, yorumlar..."></textarea></div>
    </div>
    <button class="sub-btn" onclick="gonderGunluk()">[ GÜNLÜK RAPORU GÖNDER ]</button>
  </div></div>`;
    }

    let gMesaiImgs = [], gDeneyImgs = [];

    function handleGImgs(e, tip) {
      Array.from(e.target.files).forEach(f => {
        const r = new FileReader();
        r.onload = ev => {
          if (tip === 'mesai') { gMesaiImgs.push(ev.target.result); renderGImgs('mesai'); }
          else { gDeneyImgs.push(ev.target.result); renderGImgs('deney'); }
        };
        r.readAsDataURL(f);
      });
    }
    function renderGImgs(tip) {
      if (tip === 'mesai') {
        const p = document.getElementById('gmesaiprev'); if (!p) return;
        p.innerHTML = gMesaiImgs.map((s,i) => `<div class="img-th"><img src="${s}"/><button class="img-th-rm" onclick="rmGImg('mesai',${i})">✕</button></div>`).join('');
      } else {
        const p = document.getElementById('gdeneyprev'); if (!p) return;
        p.innerHTML = gDeneyImgs.map((s,i) => `<div class="img-th"><img src="${s}"/><button class="img-th-rm" onclick="rmGImg('deney',${i})">✕</button></div>`).join('');
      }
    }
    function rmGImg(tip, i) {
      if (tip === 'mesai') { gMesaiImgs.splice(i,1); renderGImgs('mesai'); }
      else { gDeneyImgs.splice(i,1); renderGImgs('deney'); }
    }

    async function gonderGunluk() {
      const alanlar = [
        { id: 'g-roblox', errId: 'gerr-roblox', label: 'Roblox Takma Adı' },
        { id: 'g-deneyler', errId: 'gerr-deneyler', label: 'Yapılan Deneyler' },
        { id: 'g-sure', errId: 'gerr-sure', label: 'Mesai Süresi' },
      ];
      document.querySelectorAll('[id^="gerr-"]').forEach(e => e.classList.remove('show'));
      document.getElementById('gform-err').classList.remove('show');
      alanlar.forEach(a => { const el = document.getElementById(a.id); if (el) el.classList.remove('field-err'); });

      const eksikler = [];
      alanlar.forEach(a => {
        const el = document.getElementById(a.id); if (!el) return;
        if (!el.value.trim()) {
          el.classList.add('field-err');
          const em = document.getElementById(a.errId); if (em) em.classList.add('show');
          eksikler.push(a.label);
        }
      });
      if (eksikler.length) {
        const box = document.getElementById('gform-err');
        box.innerHTML = eksikler.map(l => `• ${l}`).join('<br>');
        box.classList.add('show');
        box.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }

      const btn2 = document.querySelector('#ca .sub-btn');
      if (btn2) { btn2.disabled = true; btn2.textContent = '[ GÖNDERİLİYOR... ]'; }

      const saved = await insertGRap({
        username: CU.username, displayName: CU.displayName,
        dNo: fmtNo(userGRapCount(CU.username) + 1),
        robloxAdi: document.getElementById('g-roblox').value.trim(),
        rutbe: CU.rutbe || '', rutbeKat: CU.rutbeKat || '',
        deneyler: document.getElementById('g-deneyler').value.trim(),
        sure: document.getElementById('g-sure').value.trim(),
        ekler: document.getElementById('g-ekler').value.trim(),
        mesaiImgs: [...gMesaiImgs], deneyImgs: [...gDeneyImgs]
      });

      if (btn2) { btn2.disabled = false; btn2.textContent = '[ GÜNLÜK RAPORU GÖNDER ]'; }
      if (!saved) { alert('Kayıt hatası, lütfen tekrar deneyin.'); return; }

      ['g-roblox', 'g-deneyler', 'g-sure', 'g-ekler'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
      gMesaiImgs = []; gDeneyImgs = [];
      const s = document.getElementById('gsuc'); s.style.display = 'block';
      setTimeout(() => s.style.display = 'none', 4000);
    }

    function bGunlukRaporlarim() {
      const graps = getGRaps().filter(r => r.username === CU.username);
      let h = `<div><div class="ph"><h2>GÜNLÜK RAPORLARIM</h2><p>// ${graps.length} KAYIT BULUNDU</p></div><div class="rlist">`;
      if (!graps.length) h += `<div class="empty">VERİ BULUNAMADI. GÜNLÜK RAPOR GÖNDERİLMEMİŞ.</div>`;
      else graps.slice().reverse().forEach(r => h += gCard(r, false));
      return h + `</div></div>`;
    }

    function bTumGunluk() {
      const graps = getGRaps();
      const users = [...new Set(graps.map(r => r.username))].length;
      const bek = graps.filter(r => r.onayDurum === 'bekliyor').length;
      let h = `<div><div class="ph"><h2>TÜM GÜNLÜK RAPORLAR</h2><p>// SİSTEMDEKİ TÜM GÜNLÜK KAYITLAR</p></div>
  <div class="stats">
    <div class="sc"><div class="sn">${graps.length}</div><div class="sl">TOPLAM RAPOR</div></div>
    <div class="sc"><div class="sn">${users}</div><div class="sl">PERSONEL</div></div>
    <div class="sc"><div class="sn">${bek}</div><div class="sl">ONAY BEKLİYOR</div></div>
    <div class="sc"><div class="sn">${graps.filter(r=>r.onayDurum==='onaylandi').length}</div><div class="sl">ONAYLANDI</div></div>
  </div><div class="rlist">`;
      if (!graps.length) h += `<div class="empty">VERİ BULUNAMADI.</div>`;
      else graps.slice().reverse().forEach(r => h += gCard(r, true));
      return h + `</div></div>`;
    }

    function gCard(r, su) {
      const rutbeColor = r.rutbeKat ? (RC[r.rutbeKat] || 'var(--text-dim)') : 'var(--text-dim)';
      return `<div class="rc" style="border-left-color:var(--amber-dim)">
    <div class="rc-hdr">
      <div>
        <div class="rc-id" style="color:var(--amber)">GÜNLÜK-${r.dNo || '000'}</div>
        <div class="rc-meta">${su ? `<span style="color:var(--green)">${r.displayName}</span> · ` : ''}<span style="color:${rutbeColor}">${r.rutbe || '—'}</span> · ${r.tarih}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <span class="rc-scp" style="color:var(--green-dim);border-color:#1a3a1a">${r.sure || '—'}</span>
        ${onayDurumBadge(r.onayDurum)}
      </div>
    </div>
    <div class="rc-body">${r.deneyler ? r.deneyler.substring(0,120)+'…' : ''}</div>
    <div style="display:flex;gap:6px;margin-top:8px">
      <button class="exp-btn" onclick="openGMo(${r.id})">[ TAM RAPORU GÖRÜNTÜLE ]</button>
      ${(CU.role === 'yetkili' || CU.username === r.username) ? `<button class="sil-btn" onclick="silGRapor(${r.id})">[ SİL ]</button>` : ''}
    </div>
  </div>`;
    }

    let openGModalId = null;
    function openGMo(id) {
      const r = getGRaps().find(x => x.id === id); if (!r) return;
      openGModalId = id;
      const silBtn = document.getElementById('mo-sil-btn');
      if (silBtn) silBtn.style.display = (CU.role === 'yetkili' || CU.username === r.username) ? 'block' : 'none';
      document.getElementById('mt').textContent = `GÜNLÜK RAPOR — ${r.dNo || '000'} // ${r.displayName}`;
      const rutbeColor = r.rutbeKat ? (RC[r.rutbeKat] || 'var(--green)') : 'var(--green)';
      let b = `
    <div class="mf"><div class="mfl">RAPOR NO</div><div class="mfv" style="color:var(--amber)">GÜNLÜK-${r.dNo || '000'}</div></div>
    <div class="mf"><div class="mfl">ROBLOX TAKMA ADI</div><div class="mfv">${r.robloxAdi || '—'}</div></div>
    <div class="mf"><div class="mfl">MEVCUT RÜTBE</div><div class="mfv" style="color:${rutbeColor}">${r.rutbe || '—'}</div></div>
    <div class="mf"><div class="mfl">YAPILAN DENEYLER</div><div class="mfp">${r.deneyler || '—'}</div></div>
    <div class="mf"><div class="mfl">MESAİDE GEÇİRİLEN SÜRE</div><div class="mfv">${r.sure || '—'}</div></div>
    <div class="mf"><div class="mfl">RAPOR TARİHİ</div><div class="mfv">${r.tarih}</div></div>`;
      if (r.ekler) b += `<div class="mf"><div class="mfl">// EKLEMEK İSTEDİKLERİM</div><div class="mfp">${r.ekler}</div></div>`;
      // Onay durumu
      b += `<div class="mf"><div class="mfl">// ONAY DURUMU</div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:4px">
      ${onayDurumBadge(r.onayDurum)}
      ${r.onayYapan ? `<span style="font-size:10px;color:var(--text-dim)">— ${r.onayYapan} · ${r.onayTarih}</span>` : ''}
    </div>
    ${CU.role === 'yetkili' ? `<div class="onay-btn-grp">
      <button class="onay-btn onayla" onclick="onaylaGRapor(${r.id})">[ ✓ ONAYLA ]</button>
      <button class="onay-btn reddet" onclick="reddetGRapor(${r.id})">[ ✕ REDDET ]</button>
    </div>` : ''}
  </div>`;
      if (r.mesaiImgs?.length) {
        b += `<div class="mf"><div class="mfl">// MESAİDEN GÖRSELLER</div><div class="mimgs">`;
        r.mesaiImgs.forEach(s => b += `<img src="${s}" class="mimg" onclick="openLb('${s}')" title="Büyütmek için tıkla"/>`);
        b += `</div></div>`;
      }
      if (r.deneyImgs?.length) {
        b += `<div class="mf"><div class="mfl">// DENEY İÇİNDEN GÖRSELLER</div><div class="mimgs">`;
        r.deneyImgs.forEach(s => b += `<img src="${s}" class="mimg" onclick="openLb('${s}')" title="Büyütmek için tıkla"/>`);
        b += `</div></div>`;
      }
      document.getElementById('mbody').innerHTML = b;
      // Modal silme butonunu günlük moda ayarla
      const silBtnEl = document.getElementById('mo-sil-btn');
      if (silBtnEl) {
        silBtnEl.onclick = () => silGRaporFromModal();
        silBtnEl.style.display = (CU.role === 'yetkili' || CU.username === r.username) ? 'block' : 'none';
      }
      document.getElementById('mo').classList.add('active');
    }

    async function onaylaGRapor(id) {
      const fields = { onay_durum: 'onaylandi', onay_yapan: CU.displayName, onay_tarih: new Date().toLocaleString('tr-TR') };
      await updateGRap(id, fields);
      openGMo(id);
      document.getElementById('ca').innerHTML = bTumGunluk();
    }
    async function reddetGRapor(id) {
      const fields = { onay_durum: 'reddedildi', onay_yapan: CU.displayName, onay_tarih: new Date().toLocaleString('tr-TR') };
      await updateGRap(id, fields);
      openGMo(id);
      document.getElementById('ca').innerHTML = bTumGunluk();
    }

    function silGRaporFromModal() { if (openGModalId) silGRapor(openGModalId); }
    function silGRapor(id) {
      const r = getGRaps().find(x => x.id === id); if (!r) return;
      silPendingId = 'g_' + id;
      document.getElementById('confirm-target').textContent = `GÜNLÜK-${r.dNo || '000'} — ${r.displayName}`;
      document.getElementById('confirm-overlay').classList.add('active');
    }
    // ============ GÜNLÜK RAPOR SİSTEMİ SONU ============

    let silPendingId = null, openModalId = null;

    function silFromModal() { if (openModalId) silRapor(openModalId) }

    function silRapor(id) {
      const r = getRaps().find(x => x.id === id); if (!r) return;
      silPendingId = id;
      document.getElementById('confirm-target').textContent = `${r.scd || '—'} // DENEY-${r.dNo || '000'} — ${r.displayName}`;
      document.getElementById('confirm-overlay').classList.add('active');
    }
    async function confirmSil() {
      if (!silPendingId) return;
      if (typeof silPendingId === 'string' && silPendingId.startsWith('g_')) {
        await deleteGRap(parseInt(silPendingId.replace('g_', '')));
      } else {
        await deleteRap(silPendingId);
      }
      silPendingId = null;
      document.getElementById('confirm-overlay').classList.remove('active');
      closeMoDirect();
      const activeNav = document.querySelector('.sb-item.active');
      if (activeNav) {
        const id = activeNav.id.replace('nav-', '');
        if (id === 'dosyalar' && VF) { document.getElementById('ca').innerHTML = bDosyalar(); }
        else showPage(id);
      }
    }
    function cancelSil() {
      silPendingId = null;
      document.getElementById('confirm-overlay').classList.remove('active');
    }

    function closeMo(e) { if (e.target === document.getElementById('mo')) closeMoDirect() }
    function closeMoDirect() { document.getElementById('mo').classList.remove('active') }
  </script>
</body>

</html>
