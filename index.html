<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIERDIO</title>
  <style>
    body, html { 
      margin: 0; padding: 0; width: 100%; height: 100%; 
      overflow: hidden; background: #050505; 
      font-family: 'Segoe UI', Tahoma, sans-serif; 
    }
    
    /* Aurora Gradient Efekti */
    .aurora {
      position: absolute; inset: 0;
      background: linear-gradient(125deg, #1a0b2e, #0f1c3f, #0a2322);
      z-index: 0;
    }
    .aurora::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 70% 30%, rgba(138, 43, 226, 0.4), transparent 50%),
                  radial-gradient(circle at 30% 70%, rgba(0, 255, 65, 0.2), transparent 50%);
      filter: blur(80px);
    }

    .content {
      position: relative; z-index: 1; display: flex; flex-direction: column; 
      align-items: center; justify-content: center; height: 100vh;
    }

    h1 { 
      color: #fff; font-size: 5rem; letter-spacing: 20px; 
      text-transform: uppercase; margin-bottom: 60px; font-weight: 200;
      text-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    .card {
      padding: 20px 40px; 
      background: rgba(255, 255, 255, 0.05); 
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2); 
      border-radius: 30px;
      color: #fff; text-decoration: none; font-size: 1rem; 
      letter-spacing: 3px; transition: 0.4s;
    }

    .card:hover { 
      background: rgba(255, 255, 255, 0.15); 
      border-color: rgba(0, 255, 65, 0.5);
      transform: translateY(-5px);
    }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <div class="content">
    <h1>DIERDIO</h1>
    <a href="/terminal/" class="card">RAPOR TERMİNALİ</a>
  </div>
</body>
</html>
