<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIERDIO</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Mor Renk Paleti */
      --purple: #b026ff;
      --purple-dim: #6b149b;
      --bg: #09030e;
      --bg-light: #150820;
      --text: #f3e8ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      /* Arka Plan Geometrik Deseni (Mor Tonlarda) */
      background-image: 
        linear-gradient(45deg, transparent 49%, rgba(176, 38, 255, 0.04) 49%, rgba(176, 38, 255, 0.04) 51%, transparent 51%),
        linear-gradient(-45deg, transparent 49%, rgba(176, 38, 255, 0.04) 49%, rgba(176, 38, 255, 0.04) 51%, transparent 51%);
      background-size: 60px 60px;
    }

    /* Ana Başlık Tasarımı */
    .header {
      text-align: center;
      margin-bottom: 50px;
      position: relative;
      padding: 30px;
      border-top: 2px solid var(--purple);
      border-bottom: 2px solid var(--purple);
    }

    .header::before, .header::after {
      content: ''; position: absolute; top: 5px; bottom: 5px; width: 100%;
      border-top: 1px solid var(--purple-dim); border-bottom: 1px solid var(--purple-dim);
      left: 0; pointer-events: none;
    }

    .header h1 {
      font-family: 'Cormorant Garamond', serif; font-size: 4rem; font-weight: 700;
      letter-spacing: 15px; color: var(--purple); text-transform: uppercase;
      text-shadow: 0 0 15px rgba(176, 38, 255, 0.4);
    }

    /* Tekli Buton Grid Düzeni */
    .portfolio-grid {
      display: flex; justify-content: center; width: 100%; max-width: 600px;
    }

    /* Minimalist Kart Tasarımı */
    .card {
      background: var(--bg-light); position: relative; padding: 50px 40px;
      text-align: center; text-decoration: none; color: var(--text);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      border: 1px solid var(--purple-dim); outline: 1px solid var(--purple-dim);
      outline-offset: -8px; transition: all 0.4s ease; cursor: pointer; width: 100%;
    }

    .card::before {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 40px; height: 4px; background: var(--purple);
    }

    .card::after {
      content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 40px; height: 4px; background: var(--purple);
    }

    .card:hover {
      background: var(--purple); outline-offset: -12px;
      outline-color: var(--bg); box-shadow: 0 10px 30px rgba(176, 38, 255, 0.25);
    }

    .card:hover .card-title { color: var(--bg); }

    .card-title {
      font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 600;
      letter-spacing: 5px; color: var(--purple); transition: color 0.4s;
    }

    @media (max-width: 768px) {
      .header h1 { font-size: 2.5rem; letter-spacing: 8px; }
      .card { padding: 40px 20px; }
      .card-title { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>DIERDIO</h1>
  </div>

  <div class="portfolio-grid">
    <a href="/terminal/" class="card">
      <div class="card-title">RAPOR TERMİNALİ</div>
    </a>
  </div>

</body>
</html>
