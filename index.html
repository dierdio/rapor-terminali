  <style>
    /* Özel İmleç İçin Varsayılanı Gizle */
    body, html, a, button {
      cursor: none !important; 
    }

    body, html { 
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
      background: #050505; 
      font-family: 'Space Grotesk', sans-serif; 
    }
    
    /* Aurora Arka Plan */
    #aurora {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), #4a148c, #004d40 40%, #050505 80%);
      transition: background 0.8s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 0;
    }

    /* Partikül Katmanı */
    #particles {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1; pointer-events: none;
    }

    /* İçerik ve Açılış Animasyonu (Intro) */
    .content {
      position: relative; z-index: 2; display: flex; flex-direction: column; 
      align-items: center; justify-content: center; height: 100vh; pointer-events: none;
      opacity: 0;
      animation: fadeUpIn 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
    }

    @keyframes fadeUpIn {
      0% { opacity: 0; transform: translateY(50px); filter: blur(10px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    h1 { 
      color: #fff; font-size: 5.5rem; letter-spacing: 24px; 
      text-transform: uppercase; margin-bottom: 60px; font-weight: 300;
      text-shadow: 0 0 30px rgba(255,255,255,0.15);
      margin-left: 24px; /* Harf aralığı dengesi için */
    }

    /* 3D Tilt Kart Kapsayıcısı */
    .tilt-wrapper {
      pointer-events: auto;
      perspective: 1200px; /* 3D derinlik */
    }

    .card {
      display: inline-block; padding: 22px 50px; background: rgba(255, 255, 255, 0.03); 
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.08); 
      border-radius: 12px; color: #fff; text-decoration: none; 
      font-size: 1.1rem; letter-spacing: 5px; font-weight: 400;
      transition: background 0.4s, border-color 0.4s, box-shadow 0.4s, transform 0.1s ease-out;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      transform-style: preserve-3d;
    }

    .card:hover { 
      background: rgba(255, 255, 255, 0.08); 
      border-color: rgba(0, 255, 100, 0.3); 
      box-shadow: 0 20px 50px rgba(0, 255, 100, 0.15);
    }
    
    .card span {
      display: inline-block;
      transform: translateZ(40px); /* Yazıyı 3D olarak öne çıkarma */
      pointer-events: none; /* Metnin tıklamayı engellememesi için */
    }

    /* Sosyal Medya İkonları */
    .socials {
      position: absolute; bottom: 40px; z-index: 2; width: 100%;
      display: flex; justify-content: center; gap: 30px; pointer-events: auto;
      opacity: 0;
      animation: fadeUpIn 1.5s cubic-bezier(0.16, 1, 0.3, 1) 1.2s forwards; /* Daha geç belirir */
    }

    .socials a {
      color: rgba(255,255,255,0.4); width: 22px; height: 22px;
      transition: color 0.3s, transform 0.3s, filter 0.3s;
      display: flex; align-items: center; justify-content: center;
    }

    .socials a:hover {
      color: #fff; transform: translateY(-5px) scale(1.1);
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
    }

    /* Özel İmleç (Artı / Crosshair şekli) */
    #custom-cursor {
      position: fixed; top: 0; left: 0; width: 24px; height: 24px;
      pointer-events: none; z-index: 9999;
      mix-blend-mode: difference; /* Arka plana göre zıt renk alır */
      transform: translate(-50%, -50%);
      transition: width 0.2s cubic-bezier(0.16, 1, 0.3, 1), height 0.2s cubic-bezier(0.16, 1, 0.3, 1), transform 0.05s linear;
    }
    
    #custom-cursor::before, #custom-cursor::after {
      content: ''; position: absolute; background: #fff;
    }
    #custom-cursor::before { top: 50%; left: 0; width: 100%; height: 2px; transform: translateY(-50%); }
    #custom-cursor::after { top: 0; left: 50%; width: 2px; height: 100%; transform: translateX(-50%); }

    /* Hover durumunda imleç şekli (Çarpı olur ve büyür) */
    body.hovering #custom-cursor {
      width: 45px; height: 45px;
      transform: translate(-50%, -50%) rotate(45deg); 
    }

  </style>

  <script>
    // --- ÖZEL İMLEÇ (CUSTOM CURSOR) ---
    const cursor = document.getElementById('custom-cursor');
    const interactables = document.querySelectorAll('a, button');
    let cursorX = window.innerWidth / 2;
    let cursorY = window.innerHeight / 2;

    document.addEventListener('mousemove', (e) => {
      cursorX = e.clientX;
      cursorY = e.clientY;
      cursor.style.transform = `translate(calc(${cursorX}px - 50%), calc(${cursorY}px - 50%))`;
    });

    interactables.forEach(el => {
      el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
      el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
    });

    // --- SES EFEKTİ (WEB AUDIO API) ---
    // Hiçbir harici dosya yüklemeden saf kod ile rahatlatıcı tıklama sesi üretimi
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function playClickSound() {
      if (!audioCtx) audioCtx = new AudioContext();
      if (audioCtx.state === 'suspended') audioCtx.resume();

      // Ahşap / Tok (Thock) sesi
      const osc = audioCtx.createOscillator();
      const oscGain = audioCtx.createGain();
      
      // Triangle daha yumuşak ama yine de vurucu bir ton verir
      osc.type = 'triangle'; 
      // Düşük frekanstan daha da düşük frekansa hızlı geçiş (tokluk hissi)
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.08);
      
      oscGain.gain.setValueAtTime(1.2, audioCtx.currentTime);
      oscGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);

      // Hafif bir tıkırtı eklemek için kısa noise (Ahşap çarpışma detayı)
      const bufferSize = audioCtx.sampleRate * 0.04;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      
      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      
      // Gürültüyü çok tiz olmaması için lowpass veya bandpass filtreden geçiriyoruz
      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.value = 600; // Kulak tırmalamayan, tok bir bant
      
      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(2.0, audioCtx.currentTime); // Hacimli ama kısa
      noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);

      osc.connect(oscGain);
      oscGain.connect(audioCtx.destination);
      
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      
      osc.start();
      osc.stop(audioCtx.currentTime + 0.08);
      noise.start();
      noise.stop(audioCtx.currentTime + 0.04);
    }

    document.getElementById('terminal-btn').addEventListener('click', (e) => {
      playClickSound();
      // Yönlendirmeyi çok hafif geciktirerek sesin duyulmasını garanti altına alabilirsiniz
      // Ancak varsayılan yönlendirme de gayet hızlı ve iyi çalışacaktır.
    });

    // --- AURORA ARKA PLAN HAREKETİ ---
    const aurora = document.getElementById('aurora');
    let targetX = 50, targetY = 50, currentX = 50, currentY = 50;

    document.addEventListener('mousemove', (e) => {
      targetX = (e.clientX / window.innerWidth) * 100;
      targetY = (e.clientY / window.innerHeight) * 100;
    });

    function animateAurora() {
      const time = Date.now() * 0.0003;
      const driftX = Math.sin(time) * 15;
      const driftY = Math.cos(time) * 15;
      
      currentX += (targetX + driftX - currentX) * 0.04;
      currentY += (targetY + driftY - currentY) * 0.04;
      
      aurora.style.setProperty('--x', `${currentX}%`);
      aurora.style.setProperty('--y', `${currentY}%`);
      requestAnimationFrame(animateAurora);
    }
    animateAurora();

    // --- 3D TILT EFEKTİ ---
    const card = document.querySelector('.card');
    const tiltWrapper = document.querySelector('.tilt-wrapper');

    tiltWrapper.addEventListener('mousemove', (e) => {
      const rect = tiltWrapper.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      
      // X ve Y rotasyon hesaplamaları. Bölünen sayı büyüdükçe efekt yumuşar.
      const rotateX = ((y - centerY) / centerY) * -12; 
      const rotateY = ((x - centerX) / centerX) * 12;

      card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });

    tiltWrapper.addEventListener('mouseleave', () => {
      // Fare karttan ayrıldığında eski konumuna yumuşak geçiş
      card.style.transform = `rotateX(0deg) rotateY(0deg)`;
    });

    // --- PARTİCÜL (PARTICLE) EFEKTİ (CANVAS) ---
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particlesArray = [];
    
    function setCanvasSize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    setCanvasSize();
    window.addEventListener('resize', () => {
      setCanvasSize();
      initParticles();
    });

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 1.5 + 0.5; // Çok ince, yıldız tozu gibi
        this.speedX = Math.random() * 0.4 - 0.2;
        this.speedY = Math.random() * -0.5 - 0.1; // Hafifçe yukarı doğru uçuş
        this.opacity = Math.random() * 0.5 + 0.1;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        
        // Ekrana yukarıdan çıkarsa aşağıdan başlat
        if (this.y < 0) {
          this.y = canvas.height;
          this.x = Math.random() * canvas.width;
        }
        // Sağa sola çıkış
        if (this.x > canvas.width) this.x = 0;
        else if (this.x < 0) this.x = canvas.width;
      }
      draw() {
        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initParticles() {
      particlesArray = [];
      // Ekran genişliğine göre partikül sayısı hesaplama
      const numberOfParticles = Math.min(Math.floor(window.innerWidth / 15), 150); 
      for (let i = 0; i < numberOfParticles; i++) {
        particlesArray.push(new Particle());
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < particlesArray.length; i++) {
        particlesArray[i].update();
        particlesArray[i].draw();
      }
      requestAnimationFrame(animateParticles);
    }

    initParticles();
    animateParticles();
  </script>
