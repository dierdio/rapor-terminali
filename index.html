<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tesis-62 // Rapor Terminali v3.0</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --green: #00ff41;
      --green-dim: #00a82a;
      --green-dark: #003d10;
      --green-glow: rgba(0, 255, 65, 0.12);
      --red: #ff2222;
      --red-dim: #8b0000;
      --amber: #ffb000;
      --amber-dim: #7a5200;
      --bg: #050a05;
      --bg2: #080f08;
      --bg3: #0a140a;
      --border: #1a3a1a;
      --text: #00ff41;
      --text-dim: #00a82a;
      --text-dark: #004d15;
      --hc: #9b2335;
      --hr: #e05252;
      --mr: #d4a017;
      --lr: #4caf50;
    }

    html,
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace
    }

    body {
      position: relative;
      overflow-x: hidden
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.07) 2px, rgba(0, 0, 0, 0.07) 4px);
      pointer-events: none;
      z-index: 9999
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0, 0, 0, 0.55) 100%);
      pointer-events: none;
      z-index: 9998
    }

    @keyframes blink {

      0%,
      50% {
        opacity: 1
      }

      51%,
      100% {
        opacity: 0
      }
    }

    @keyframes scanline {
      0% {
        top: -8%
      }

      100% {
        top: 108%
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .scanline {
      position: fixed;
      width: 100%;
      height: 36px;
      background: linear-gradient(transparent, rgba(0, 255, 65, 0.03), transparent);
      animation: scanline 7s linear infinite;
      pointer-events: none;
      z-index: 9997;
      top: 0;
      left: 0
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: var(--green);
      animation: blink .7s infinite;
      vertical-align: middle;
      margin-left: 2px
    }

    /* VERSİYON ROZET */
    .build-ver {
      position: fixed;
      bottom: 10px;
      right: 14px;
      font-size: 10px;
      color: var(--text-dark);
      letter-spacing: 2px;
      z-index: 10000;
      pointer-events: none;
      font-family: 'Share Tech Mono', monospace
    }

    .build-ver span {
      color: var(--green-dim)
    }

    /* HEADER */
    .hdr {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 10px 22px;
      position: sticky;
      top: 0;
      z-index: 100
    }

    .hdr-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px
    }

    .hdr-logo {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .scp-badge {
      font-family: 'VT323', monospace;
      font-size: 30px;
      color: var(--red);
      text-shadow: 0 0 10px var(--red);
      letter-spacing: 2px
    }

    .hdr-t {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px
    }

    .hdr-main {
      font-family: 'VT323', monospace;
      font-size: 20px;
      color: var(--green);
      letter-spacing: 2px;
      text-shadow: 0 0 8px var(--green)
    }

    .hdr-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px
    }

    .hdr-clock {
      font-size: 10px;
      color: var(--amber);
      letter-spacing: 1px
    }

    .hdr-user {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      color: var(--text-dim)
    }

    .sdot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 5px var(--green);
      display: inline-block;
      margin-right: 3px;
      animation: blink 2s infinite
    }

    .sdot.red {
      background: var(--red);
      box-shadow: 0 0 5px var(--red)
    }

    .logout-btn {
      background: none;
      border: 1px solid var(--red-dim);
      color: var(--red);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      padding: 3px 10px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all .15s
    }

    .logout-btn:hover {
      background: var(--red-dim);
      color: #fff
    }

    .hdr-status {
      display: flex;
      gap: 18px;
      font-size: 9px;
      color: var(--text-dark);
      letter-spacing: 1px
    }

    /* LAYOUT */
    .main-screen {
      display: none;
      min-height: 100vh;
      flex-direction: column
    }

    .main-screen.active {
      display: flex;
      animation: fadeIn .4s ease
    }

    .main-body {
      display: flex;
      flex: 1
    }

    .sidebar {
      width: 210px;
      min-width: 210px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      padding: 12px 0
    }

    .sb-label {
      font-size: 9px;
      color: var(--text-dark);
      letter-spacing: 2px;
      padding: 10px 14px 5px;
      border-bottom: 1px solid var(--border)
    }

    .sb-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      cursor: pointer;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 1px;
      border: none;
      background: none;
      text-align: left;
      width: 100%;
      border-left: 2px solid transparent;
      transition: all .12s;
      font-family: 'Share Tech Mono', monospace
    }

    .sb-item::before {
      content: '// ';
      color: var(--text-dark)
    }

    .sb-item:hover {
      background: var(--green-glow);
      color: var(--green);
      border-left-color: var(--green-dim)
    }

    .sb-item.active {
      background: var(--green-glow);
      color: var(--green);
      border-left: 2px solid var(--green)
    }

    .sb-item.active::before {
      color: var(--green)
    }

    .content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      background: var(--bg)
    }

    /* PAGE */
    .ph {
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px
    }

    .ph h2 {
      font-family: 'VT323', monospace;
      font-size: 26px;
      color: var(--green);
      letter-spacing: 2px
    }

    .ph h2::before {
      content: '>>> ';
      color: var(--text-dim)
    }

    .ph p {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      margin-top: 4px
    }

    /* FORM */
    .rf {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 20px;
      max-width: 720px
    }

    .fs {
      border-left: 2px solid var(--green-dark);
      padding-left: 14px;
      margin-bottom: 20px
    }

    .fs-title {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 3px;
      margin-bottom: 12px;
      text-transform: uppercase
    }

    .frow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    .fg {
      margin-bottom: 12px
    }

    .fg label {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      display: block;
      margin-bottom: 5px
    }

    .fg label::before {
      content: '[+] ';
      color: var(--green-dim)
    }

    .ts,
    .ta,
    .tn,
    .tin,
    .ttm {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--green-dark);
      border-left: 2px solid var(--green-dim);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      padding: 7px 10px;
      outline: none;
      transition: all .15s
    }

    .ts:focus,
    .ta:focus,
    .tn:focus,
    .tin:focus,
    .ttm:focus {
      border-color: var(--green);
      box-shadow: 0 0 8px rgba(0, 255, 65, 0.13)
    }

    .ts option {
      background: var(--bg2)
    }

    .ta {
      min-height: 90px;
      resize: vertical;
      line-height: 1.6
    }

    .tn {
      -moz-appearance: textfield;
      appearance: textfield
    }

    .tn::-webkit-outer-spin-button,
    .tn::-webkit-inner-spin-button {
      -webkit-appearance: none;
      appearance: none
    }

    /* TIMESTAMPS */
    .ts-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px
    }

    .ts-row {
      display: grid;
      grid-template-columns: 130px 1fr 28px;
      gap: 6px;
      align-items: center
    }

    .ts-t {
      background: var(--bg3);
      border: 1px solid var(--green-dark);
      border-left: 2px solid var(--amber-dim);
      color: var(--amber);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      padding: 6px 8px;
      outline: none;
      width: 100%
    }

    .ts-t:focus {
      border-color: var(--amber);
      box-shadow: 0 0 5px rgba(255, 176, 0, 0.12)
    }

    .ts-n {
      background: var(--bg3);
      border: 1px solid var(--green-dark);
      border-left: 2px solid var(--green-dim);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      padding: 6px 8px;
      outline: none;
      width: 100%
    }

    .ts-n:focus {
      border-color: var(--green);
      box-shadow: 0 0 5px rgba(0, 255, 65, 0.1)
    }

    .ts-rm {
      background: none;
      border: 1px solid var(--red-dim);
      color: var(--red);
      font-size: 12px;
      cursor: pointer;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .12s
    }

    .ts-rm:hover {
      background: var(--red-dim)
    }

    .add-ts {
      background: none;
      border: 1px solid var(--green-dark);
      color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      padding: 5px 12px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all .12s
    }

    .add-ts:hover {
      border-color: var(--green);
      color: var(--green)
    }

    .add-ts::before {
      content: '[+] '
    }

    /* IMAGES */
    .img-area {
      border: 1px dashed var(--green-dark);
      padding: 14px;
      text-align: center;
      cursor: pointer;
      transition: all .15s;
      background: var(--bg3)
    }

    .img-area:hover {
      border-color: var(--green);
      background: var(--green-glow)
    }

    .img-area input {
      display: none
    }

    .img-lbl {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      cursor: pointer;
      display: block
    }

    .img-lbl::before {
      content: '[UPLOAD] ';
      color: var(--green-dim)
    }

    .img-prev {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px
    }

    .img-th {
      position: relative;
      width: 80px;
      height: 60px;
      border: 1px solid var(--green-dark);
      overflow: hidden
    }

    .img-th img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.3) brightness(0.8)
    }

    .img-th:hover img {
      filter: none
    }

    .img-th-rm {
      position: absolute;
      top: 0;
      right: 0;
      background: rgba(139, 0, 0, 0.85);
      color: var(--red);
      border: none;
      font-size: 10px;
      cursor: pointer;
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center
    }

    /* BUTTONS */
    .sub-btn {
      background: var(--green-dark);
      border: 1px solid var(--green);
      color: var(--green);
      font-family: 'VT323', monospace;
      font-size: 22px;
      padding: 9px 28px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all .2s;
      margin-top: 10px
    }

    .sub-btn:hover {
      background: var(--green);
      color: var(--bg);
      box-shadow: 0 0 18px rgba(0, 255, 65, 0.35)
    }

    .suc {
      display: none;
      background: rgba(0, 61, 16, 0.5);
      border: 1px solid var(--green-dim);
      color: var(--green);
      font-size: 11px;
      padding: 10px 14px;
      margin-bottom: 14px;
      letter-spacing: 1px;
      max-width: 720px
    }

    .suc::before {
      content: '[SİSTEM] '
    }

    /* CARDS */
    .rlist {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 820px
    }

    .rc {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--green-dim);
      padding: 14px 16px;
      transition: border-color .12s
    }

    .rc:hover {
      border-left-color: var(--green);
      box-shadow: 0 0 10px rgba(0, 255, 65, 0.04)
    }

    .rc-hdr {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 5px;
      gap: 12px
    }

    .rc-id {
      font-family: 'VT323', monospace;
      font-size: 20px;
      color: var(--green);
      letter-spacing: 1px
    }

    .rc-meta {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      margin-top: 2px
    }

    .rc-scp {
      font-size: 10px;
      color: var(--amber);
      border: 1px solid var(--amber-dim);
      padding: 2px 8px;
      letter-spacing: 1px;
      white-space: nowrap
    }

    .rc-body {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.6;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border)
    }

    .exp-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      padding: 3px 10px;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 1px;
      transition: all .12s
    }

    .exp-btn:hover {
      border-color: var(--green);
      color: var(--green)
    }

    /* FOLDERS */
    .fgrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 10px;
      max-width: 820px
    }

    .fi {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 14px;
      cursor: pointer;
      transition: all .12s;
      text-align: center
    }

    .fi:hover {
      border-color: var(--green);
      box-shadow: 0 0 10px rgba(0, 255, 65, 0.08)
    }

    .fi-icon {
      font-family: 'VT323', monospace;
      font-size: 28px;
      color: var(--green-dim);
      display: block;
      margin-bottom: 6px
    }

    .fi-name {
      font-size: 11px;
      color: var(--text);
      letter-spacing: 1px
    }

    .fi-count {
      font-size: 9px;
      color: var(--text-dim);
      margin-top: 3px;
      letter-spacing: 1px
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      padding: 0 0 12px;
      letter-spacing: 1px;
      display: inline-flex;
      align-items: center;
      gap: 5px
    }

    .back-btn::before {
      content: '<< '
    }

    .back-btn:hover {
      color: var(--green)
    }

    /* STATS */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
      max-width: 720px
    }

    .sc {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 12px;
      text-align: center
    }

    .sn {
      font-family: 'VT323', monospace;
      font-size: 34px;
      color: var(--green);
      text-shadow: 0 0 10px rgba(0, 255, 65, 0.25)
    }

    .sl {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 2px;
      margin-top: 2px
    }

    /* EMPTY */
    .empty {
      text-align: center;
      padding: 50px;
      color: var(--text-dark);
      font-size: 11px;
      letter-spacing: 2px
    }

    .empty::before {
      content: '[NULL] '
    }

    /* MODAL */
    .mo {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px
    }

    .mo.active {
      display: flex
    }

    .mb {
      background: var(--bg2);
      border: 1px solid var(--green);
      max-width: 740px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 0 40px rgba(0, 255, 65, 0.12)
    }

    .mh {
      background: var(--green-dark);
      border-bottom: 1px solid var(--green-dim);
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0
    }

    .mt {
      font-family: 'VT323', monospace;
      font-size: 20px;
      color: var(--green);
      letter-spacing: 2px
    }

    .mc {
      background: none;
      border: 1px solid var(--red-dim);
      color: var(--red);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      padding: 3px 10px;
      cursor: pointer
    }

    .mc:hover {
      background: var(--red-dim)
    }

    .mbody {
      padding: 20px;
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.8
    }

    .mf {
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px
    }

    .mfl {
      font-size: 9px;
      color: var(--text-dark);
      letter-spacing: 2px;
      margin-bottom: 4px
    }

    .mfv {
      color: var(--green);
      font-size: 12px
    }

    .mfp {
      color: var(--text-dim);
      font-size: 11px;
      line-height: 1.7;
      white-space: pre-wrap
    }

    .mts {
      display: flex;
      gap: 12px;
      margin-bottom: 4px;
      font-size: 11px
    }

    .mts-t {
      color: var(--amber);
      min-width: 100px
    }

    .mimgs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px
    }

    .mimg {
      max-width: 200px;
      max-height: 140px;
      border: 1px solid var(--green-dark);
      filter: saturate(0.4)
    }

    .mimg:hover {
      filter: none;
      border-color: var(--green);
      cursor: zoom-in
    }

    /* VALİDASYON */
    .field-err {
      border-color: var(--red) !important;
      box-shadow: 0 0 8px rgba(255, 34, 34, 0.2) !important
    }

    .val-msg {
      display: none;
      font-size: 9px;
      color: var(--red);
      letter-spacing: 1px;
      margin-top: 4px
    }

    .val-msg::before {
      content: '[!] '
    }

    .val-msg.show {
      display: block
    }

    .form-err-box {
      display: none;
      background: rgba(139, 0, 0, 0.12);
      border: 1px solid var(--red-dim);
      padding: 10px 14px;
      margin-bottom: 14px;
      font-size: 10px;
      color: var(--red);
      letter-spacing: 1px;
      line-height: 1.8
    }

    .form-err-box::before {
      content: '[HATA] ZORUNLU ALANLAR EKSİK:\A';
      white-space: pre;
      font-size: 9px;
      color: var(--red-dim)
    }

    .form-err-box.show {
      display: block
    }

    .onay-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 9px;
      letter-spacing: 1px;
      padding: 2px 8px;
      border: 1px solid
    }

    .onay-bekliyor {
      color: var(--amber);
      border-color: var(--amber-dim);
      background: rgba(255, 176, 0, 0.06)
    }

    .onay-onaylandi {
      color: var(--lr);
      border-color: #2e7d32;
      background: rgba(76, 175, 80, 0.06)
    }

    .onay-reddedildi {
      color: var(--red);
      border-color: var(--red-dim);
      background: rgba(139, 0, 0, 0.1)
    }

    .onay-btn-grp {
      display: flex;
      gap: 6px;
      margin-top: 10px
    }

    .onay-btn {
      background: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      padding: 4px 12px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all .15s;
      border: 1px solid
    }

    .onay-btn.onayla {
      color: var(--lr);

    // ============ GÜVENLİK: XSS KORUMASI ============
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    // ============ GÜVENLİK: TAMPER-PROOF KULLANICI SİSTEMİ ============
    // CU artık doğrudan değiştirilemez — closure ile korunuyor
    const _CU_STORE = (() => {
      const _key = Symbol('cu');
      const store = { [_key]: null };
      return {
        set(data) {
          store[_key] = Object.freeze({ ...data, _ts: Date.now() });
        },
        get() { return store[_key]; },
      };
    })();
    // CU property — getter only, setter yok
    Object.defineProperty(window, 'CU', {
      get() { return _CU_STORE.get(); },
      set() { console.warn('[GÜVENLİK] CU değiştirilemez.'); },
      configurable: false
    });

    let VF = null, imgs = [], tsc = 0, ALL_PROFILES = [];
    let _VERIFIED_USER_ID = null; // Supabase auth user id
    let _RAPS_CACHE = []; // Supabase'den çekilen raporlar cache

    // ============ VERİ KATMANI: SUPABASE ============
    // DB'den raporları çek ve cache'le
    async function loadRaps() {
      const { data, error } = await _supabase.from('raporlar')
        .select('*').order('created_at', { ascending: false });
      if (error) { console.error('[DB] Rapor yükleme hatası:', error); return []; }
      _RAPS_CACHE = (data || []).map(r => ({
        id: r.id,
        user_id: r.user_id,
        username: r.username,
        displayName: r.display_name,
        scd: r.scd, scp: r.scp, dNo: r.d_no,
        sorumlu: r.sorumlu, rutbe: r.rutbe,
        zb: r.zb, ze: r.ze, sd: r.sd,
        amac: r.amac, sonuc: r.sonuc,
        ano: r.ano, ek: r.ek,
        timestamps: r.timestamps || [],
        images: r.images || [],
        tarih: r.tarih,
        onayDurum: r.onay_durum,
        onayYapan: r.onay_yapan,
        onayTarih: r.onay_tarih
      }));
      return _RAPS_CACHE;
    }
    // Senkron okuma — render fonksiyonları bu cache'i kullanır
    function getRaps() { return _RAPS_CACHE; }
    function userRapCount(u) { return getRaps().filter(r => r.username === u).length }
    function fmtNo(n) { return String(n).padStart(3, '0') }

    // ============ GÜVENLİK: ROL DOĞRULAMA (her hassas işlemde çağrılır) ============
    async function verifyRole(requiredRole) {
      const { data } = await _supabase.auth.getSession();
      if (!data?.session?.user) { window.location.replace('login'); return false; }
      const { data: profile } = await _supabase.from('profiles')
        .select('role').eq('id', data.session.user.id).single();
      if (!profile) { window.location.replace('login'); return false; }
      if (requiredRole && profile.role !== requiredRole) {
        console.warn('[GÜVENLİK] Yetkisiz işlem girişimi tespit edildi.');
        return false;
      }
      return true;
    }

    // Sayfa yüklendiğinde Supabase oturumunu doğrula — yoksa login'e at
    (async function initSession() {
      const { data } = await _supabase.auth.getSession();
      if (!data?.session?.user) {
        window.location.replace('login');
        return;
      }
      const userId = data.session.user.id;
      _VERIFIED_USER_ID = userId;
      // Tüm profilleri çek (dosyalar sayfası için)
      const { data: allProfiles } = await _supabase.from('profiles').select('*');
      ALL_PROFILES = (allProfiles || []).map(p => ({
        username: p.username, role: p.role, displayName: p.display_name,
        rutbe: p.rutbe, rutbeKat: p.rutbe_kat, robloxId: p.roblox_id
      }));
      const profileData = ALL_PROFILES.find(p => p.username === (allProfiles || []).find(x => x.id === userId)?.username);
      if (!profileData) {
        await _supabase.auth.signOut();
        window.location.replace('login');
        return;
      }
      _CU_STORE.set({
        username: profileData.username,
        role: profileData.role,
        displayName: profileData.displayName,
        rutbe: profileData.rutbe,
        rutbeKat: profileData.rutbeKat,
        robloxId: profileData.robloxId,
        email: data.session.user.email
      });
      document.getElementById('hun').textContent = escapeHtml(CU.displayName);
      const re = document.getElementById('hrutbe');
      re.textContent = CU.rutbe; re.style.color = RC[CU.rutbeKat] || 'var(--green)';

      await loadRaps(); // Supabase'den raporları yükle
      showPage(CU.role === 'yetkisiz' ? 'rapor-yaz' : 'tum-raporlar');

      document.getElementById('main-screen').classList.add('active');
      updateClock();
    })();

    function updateClock() {
      const el = document.getElementById('hclock');
      if (el) { const n = new Date(); el.textContent = n.toLocaleDateString('tr-TR') + ' ' + n.toTimeString().split(' ')[0] }
    }

      const el = document.getElementById('build-ver-badge');
      if (el) el.innerHTML = 'BUILD <span>' + BUILD_VERSION + '</span>';
    })();

    // Roblox hologram yükle
    async function loadHologram(profile) {
      const panel = document.getElementById('holo-panel');
      const img = document.getElementById('holo-img');
      const name = document.getElementById('holo-name');
      const rutbe = document.getElementById('holo-rutbe');
      const idEl = document.getElementById('holo-id');

      name.textContent = profile.displayName;
      rutbe.textContent = profile.rutbe;

      if (profile.robloxId) {
        idEl.textContent = 'RBX-ID: ' + profile.robloxId;
        // Roblox thumbnail API (CORS açık)
        try {
          const res = await fetch(
            'https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=' +
            profile.robloxId + '&size=150x150&format=Png&isCircular=false'
          );
          const json = await res.json();
          const url = json?.data?.[0]?.imageUrl;
          if (url) img.src = url;
          else img.src = '';
        } catch (e) { img.src = ''; }
      } else {
        idEl.textContent = 'RBX-ID: TANIMLI DEĞİL';
        img.src = '';
      }

      panel.style.display = 'flex';
    }

    function hideHologram() {
      document.getElementById('holo-panel').style.display = 'none';
    }

      window.location.replace('login.html');

      const sb = document.getElementById('sidebar');

        else h += `<option value="${r.label}" style="color:${RC[r.kat]};background:#080f08">${r.label}</option>`;
      });
      return h;

    function bRaporYaz() {
      const nextNo = fmtNo(userRapCount(CU.username) + 1);
      return `<div>
  <div class="ph"><h2>YENİ DENEY RAPORU</h2><p>// TÜM ALANLAR GİZLİLİK SEVİYESİ-4 KAPSAMINDADIR</p></div>

  <div class="rf">
    <div class="fs">
      <div class="fs-title">// TEMEL BİLGİLER</div>
      <div class="frow">
        <div class="fg"><label>DENEY KODU</label><select class="ts" id="r-scd">${scdOpts()}</select><span class="val-msg" id="err-scd">Deney kodu seçilmelidir.</span></div>
        <div class="fg"><label>DENEY NUMARASI</label><input type="text" class="tin" value="${nextNo}" readonly style="color:var(--amber);border-left-color:var(--amber-dim)"/></div>
      </div>
      <div class="frow">
        <div class="fg"><label>SCP</label><select class="ts" id="r-scp">${scpOpts()}</select><span class="val-msg" id="err-scp">SCP seçilmelidir.</span></div>
        <div class="fg"><label>DENEY SORUMLUSU</label><input type="text" class="tin" id="r-sor" placeholder="Kod Adı"/><span class="val-msg" id="err-sor">Deney sorumlusu girilmelidir.</span></div>
      </div>
      <div class="fg"><label>PERSONEL RÜTBESİ</label><select class="ts" id="r-rutbe" onchange="upRutbeClr()">${rutbeOpts()}</select><span class="val-msg" id="err-rutbe">Rütbe seçilmelidir.</span></div>
      <div class="frow">
        <div class="fg"><label>BAŞLANGIÇ ZAMANI</label><input type="time" class="ttm" id="r-zb"/><span class="val-msg" id="err-zb">Başlangıç zamanı girilmelidir.</span></div>
        <div class="fg"><label>BİTİŞ ZAMANI</label><input type="time" class="ttm" id="r-ze"/><span class="val-msg" id="err-ze">Bitiş zamanı girilmelidir.</span></div>
      </div>
      <div class="fg"><label>KULLANILAN SINIF-D SAYISI</label><input type="number" class="tn" id="r-sd" placeholder="0" min="0"/><span class="val-msg" id="err-sd">Sınıf-D sayısı girilmelidir.</span></div>
    </div>
    <div class="fs">
      <div class="fs-title">// DENEY DETAYLARI</div>
      <div class="fg"><label>DENEY AMACI</label><textarea class="ta" id="r-amac" placeholder="Deneyin amacını açıklayın..."></textarea><span class="val-msg" id="err-amac">Deney amacı girilmelidir.</span></div>
      <div class="fg"><label>DENEY SONUCU</label><textarea class="ta" id="r-sonuc" placeholder="Deney sonuçlarını detaylıca açıklayın..."></textarea><span class="val-msg" id="err-sonuc">Deney sonucu girilmelidir.</span></div>
    </div>
    <div class="fs">
      <div class="fs-title">// ZAMAN DAMGALARI</div>
      <div class="ts-list" id="tsl"></div>
      <button class="add-ts" onclick="addTs()">ZAMAN DAMGASI EKLE</button>
    </div>
    <div class="fs">
      <div class="fs-title">// ANOMALİLER & EK BİLGİLER</div>
      <div class="fg"><label>DENEYDE YAŞANAN ANORMAL DURUMLAR</label><textarea class="ta" id="r-ano" placeholder="Gözlemlenen anormal durumları belirtin..."></textarea></div>
      <div class="fg"><label>EKLEMELERİM</label><textarea class="ta" id="r-ek" placeholder="Eklemek istediğiniz ek notlar..."></textarea></div>
    </div>
    <div class="fs">
      <div class="fs-title">// GÖRSELLER</div>
      <div class="img-area" onclick="document.getElementById('img-in').click()">
        <input type="file" id="img-in" accept="image/*" multiple onchange="handleImgs(event)"/>
        <label class="img-lbl">GÖRSEL DOSYASI YÜKLEYİN (JPG, PNG, GIF)</label>
        <div class="img-prev" id="imgprev"></div>
      </div>
    </div>
    <button class="sub-btn" onclick="gonder()">[ RAPORU GÖNDER ]</button>
  </div></div>`;
    }

    function upRutbeClr() {
      const sel = document.getElementById('r-rutbe'); if (!sel) return;
      const f = RUTBE_LIST.find(r => r.label === sel.value);
      sel.style.color = f ? RC[f.kat] || 'var(--green)' : 'var(--green)';
    }

    function addTs() {
      const list = document.getElementById('tsl'); if (!list) return;
      const id = 'ts' + Date.now(); tsc++;
      const div = document.createElement('div');
      div.className = 'ts-row'; div.id = id;
      div.innerHTML = `<input type="text" class="ts-t" placeholder="00:00:00" maxlength="8"/><input type="text" class="ts-n" placeholder="Olay açıklaması..."/><button class="ts-rm" onclick="rmTs('${id}')">✕</button>`;
      list.appendChild(div);
    }
    function rmTs(id) { const el = document.getElementById(id); if (el) { el.remove(); tsc-- } }
    function getTs() {
      return Array.from(document.querySelectorAll('.ts-row')).map(r => ({ time: r.querySelector('.ts-t').value.trim(), note: r.querySelector('.ts-n').value.trim() })).filter(t => t.time || t.note);
    }

    function handleImgs(e) {
      Array.from(e.target.files).forEach(f => {
        const r = new FileReader();
        r.onload = ev => { imgs.push(ev.target.result); renderImgs() };
        r.readAsDataURL(f);
      });
    }
    function renderImgs() {
      const p = document.getElementById('imgprev'); if (!p) return;
      p.innerHTML = imgs.map((s, i) => `<div class="img-th"><img src="${s}"/><button class="img-th-rm" onclick="rmImg(${i})">✕</button></div>`).join('');
    }
    function rmImg(i) { imgs.splice(i, 1); renderImgs() }

    async function gonder() {
      // Tüm hataları temizle
      ['r-scd', 'r-scp', 'r-sor', 'r-rutbe', 'r-zb', 'r-ze', 'r-sd', 'r-amac', 'r-sonuc'].forEach(id => {
        const el = document.getElementById(id); if (el) el.classList.remove('field-err');
      });
      document.querySelectorAll('.val-msg').forEach(e => e.classList.remove('show'));
      document.getElementById('form-err').classList.remove('show');

      const alanlar = [
        { id: 'r-scd', errId: 'err-scd', label: 'Deney Kodu' },
        { id: 'r-scp', errId: 'err-scp', label: 'SCP' },
        { id: 'r-sor', errId: 'err-sor', label: 'Deney Sorumlusu' },
        { id: 'r-rutbe', errId: 'err-rutbe', label: 'Personel Rütbesi' },
        { id: 'r-zb', errId: 'err-zb', label: 'Başlangıç Zamanı' },
        { id: 'r-ze', errId: 'err-ze', label: 'Bitiş Zamanı' },
        { id: 'r-sd', errId: 'err-sd', label: 'Sınıf-D Sayısı' },
        { id: 'r-amac', errId: 'err-amac', label: 'Deney Amacı' },
        { id: 'r-sonuc', errId: 'err-sonuc', label: 'Deney Sonucu' },
      ];

      const eksikler = [];
      alanlar.forEach(a => {
        const el = document.getElementById(a.id); if (!el) return;
        const val = el.value.trim();
        if (!val) {
          el.classList.add('field-err');
          const em = document.getElementById(a.errId); if (em) em.classList.add('show');
          eksikler.push(a.label);
        }
      });

      if (eksikler.length) {
        const box = document.getElementById('form-err');
        box.innerHTML = eksikler.map(l => `• ${l}`).join('<br>');
        box.classList.add('show');
        box.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }

      const scd = document.getElementById('r-scd').value;
      const scp = document.getElementById('r-scp').value;
      const sor = document.getElementById('r-sor').value.trim();
      const rutbe = document.getElementById('r-rutbe').value;
      const amac = document.getElementById('r-amac').value.trim();
      const sonuc = document.getElementById('r-sonuc').value.trim();
      const no = fmtNo(userRapCount(CU.username) + 1);

      // Supabase'e kaydet
      const { error } = await _supabase.from('raporlar').insert({
        user_id: _VERIFIED_USER_ID,
        username: CU.username,
        display_name: CU.displayName,
        scd, scp, d_no: no, sorumlu: sor, rutbe,
        zb: document.getElementById('r-zb').value,
        ze: document.getElementById('r-ze').value,
        sd: document.getElementById('r-sd').value,
        amac, sonuc,
        ano: document.getElementById('r-ano').value.trim(),
        ek: document.getElementById('r-ek').value.trim(),
        timestamps: getTs(),
        images: [...imgs],
        tarih: new Date().toLocaleString('tr-TR')
      });

      if (error) {
        console.error('[DB] Rapor kayıt hatası:', error);
        const box = document.getElementById('form-err');
        box.innerHTML = '• Rapor kaydedilirken bir hata oluştu: ' + escapeHtml(error.message);
        box.classList.add('show');
        return;
      }

      // Cache'i güncelle
      await loadRaps();

      ['r-scd', 'r-scp', 'r-sor', 'r-rutbe', 'r-zb', 'r-ze', 'r-sd', 'r-amac', 'r-sonuc', 'r-ano', 'r-ek'].forEach(id => { const el = document.getElementById(id); if (el) el.value = '' });
      document.getElementById('tsl').innerHTML = ''; imgs = []; tsc = 0; renderImgs();
      const s = document.getElementById('suc'); s.style.display = 'block';
      setTimeout(() => s.style.display = 'none', 4000);
      // güncelle no
      const ro = document.querySelector('.tin[readonly]'); if (ro) ro.value = fmtNo(userRapCount(CU.username) + 1);
    }

    function bRaporlarim() {
      const raps = getRaps().filter(r => r.username === CU.username);
      let h = `<div><div class="ph"><h2>RAPORLARIM</h2><p>// ${raps.length} KAYIT BULUNDU</p></div><div class="rlist">`;
      if (!raps.length) h += `<div class="empty">VERİ BULUNAMADI. RAPOR GÖNDERİLMEMİŞ.</div>`;
      else raps.slice().reverse().forEach(r => h += rCard(r, false));
      return h + `</div></div>`;
    }

    function bTumRaporlar() {
      const raps = getRaps();
      const users = [...new Set(raps.map(r => r.username))].length;
      let h = `<div><div class="ph"><h2>TÜM RAPORLAR</h2><p>// SİSTEMDEKİ TÜM DENEY KAYITLARI</p></div>
  <div class="stats">
    <div class="sc"><div class="sn">${raps.length}</div><div class="sl">TOPLAM RAPOR</div></div>
    <div class="sc"><div class="sn">${users}</div><div class="sl">PERSONEL</div></div>
    <div class="sc"><div class="sn">${[...new Set(raps.map(r => r.scp))].length}</div><div class="sl">FARKLI SCP</div></div>
    <div class="sc"><div class="sn">${raps.reduce((a, r) => a + (parseInt(r.sd) || 0), 0)}</div><div class="sl">TOPLAM SINIF-D</div></div>
  </div><div class="rlist">`;
      if (!raps.length) h += `<div class="empty">VERİ BULUNAMADI.</div>`;
      else raps.slice().reverse().forEach(r => h += rCard(r, true));
      return h + `</div></div>`;
    }

    function rCard(r, su) {
      return `<div class="rc">
    <div class="rc-hdr">
      <div>
        <div class="rc-id">${escapeHtml(r.scd) || '—'} // DENEY-${escapeHtml(r.dNo) || '000'}</div>
        <div class="rc-meta">${su ? `<span style="color:var(--green)">${escapeHtml(r.displayName)}</span> · ` : ''}<span style="color:${RC[RUTBE_LIST.find(x => x.label === r.rutbe)?.kat] || 'var(--text-dim)'}">${escapeHtml(r.rutbe) || '—'}</span> · ${escapeHtml(r.tarih)}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <span class="rc-scp">${r.scp ? escapeHtml(r.scp.split('–')[0].trim()) : '—'}</span>
        ${onayDurumBadge(r.onayDurum)}
      </div>
    </div>
    <div class="rc-body">${r.amac ? escapeHtml(r.amac.substring(0, 120)) + '…' : ''}</div>
    <div style="display:flex;gap:6px;margin-top:8px">
      <button class="exp-btn" onclick="openMo(${r.id})">[ TAM RAPORU GÖRÜNTÜLE ]</button>
      ${(CU.role === 'yetkili' || CU.username === r.username) ? `<button class="sil-btn" onclick="silRapor(${r.id})">[ SİL ]</button>` : ''}
    </div>
  </div>`;
    }

    function bDosyalar() {
      const raps = getRaps();
      const yetk = ALL_PROFILES.filter(u => u.role === 'yetkisiz');
      if (VF) {
        const u = ALL_PROFILES.find(x => x.username === VF);
        const ur = raps.filter(r => r.username === VF);
        let h = `<div><button class="back-btn" onclick="VF=null;setNav('dosyalar');document.getElementById('ca').innerHTML=bDosyalar()">PERSONEL DOSYALARINA DÖN</button>
    <div class="ph"><h2>${u ? escapeHtml(u.displayName.toUpperCase()) : escapeHtml(VF)} // DOSYA</h2><p>// ${ur.length} RAPOR KAYDI</p></div><div class="rlist">`;
        if (!ur.length) h += `<div class="empty">VERİ BULUNAMADI.</div>`;
        else ur.slice().reverse().forEach(r => h += rCard(r, false));
        return h + `</div></div>`;
      }
      let h = `<div><div class="ph"><h2>PERSONEL DOSYALARI</h2><p>// YETKİSİZ PERSONEL DENEY ARŞİVLERİ</p></div><div class="fgrid">`;
      yetk.forEach(u => {
        const c = raps.filter(r => r.username === u.username).length;
        h += `<div class="fi" onclick="openFolder('${escapeHtml(u.username)}')"><span class="fi-icon">[DIR]</span><div class="fi-name">${escapeHtml(u.displayName)}</div><div class="fi-count">${c} RAPOR KAYDI</div></div>`;
      });
      return h + `</div></div>`;
    }

    function openFolder(u) { VF = u; document.getElementById('ca').innerHTML = bDosyalar() }

    function openMo(id) {
      const r = getRaps().find(x => x.id === id); if (!r) return;
      openModalId = id;
      // Silme butonunu göster/gizle
      const silBtn = document.getElementById('mo-sil-btn');
      if (silBtn) silBtn.style.display = (CU.role === 'yetkili' || CU.username === r.username) ? 'block' : 'none';
      document.getElementById('mt').textContent = `${r.scd || '—'} // DENEY-${r.dNo || '000'}`;
      const rk = RUTBE_LIST.find(x => x.label === r.rutbe);
      const rc = rk ? RC[rk.kat] || 'var(--green)' : 'var(--green)';
      let b = `
    <div class="mf"><div class="mfl">DENEY KODU / NUMARA</div><div class="mfv">${escapeHtml(r.scd) || '—'} &nbsp;|&nbsp; DENEY-${escapeHtml(r.dNo) || '000'}</div></div>
    <div class="mf"><div class="mfl">SCP</div><div class="mfv">${escapeHtml(r.scp) || '—'}</div></div>
    <div class="mf"><div class="mfl">DENEY SORUMLUSU</div><div class="mfv">${escapeHtml(r.sorumlu) || '—'}</div></div>
    <div class="mf"><div class="mfl">PERSONEL RÜTBESİ</div><div class="mfv" style="color:${rc}">${escapeHtml(r.rutbe) || '—'}</div></div>
    <div class="mf"><div class="mfl">ZAMAN</div><div class="mfv">${escapeHtml(r.zb) || '--:--'} → ${escapeHtml(r.ze) || '--:--'}</div></div>
    <div class="mf"><div class="mfl">KULLANILAN SINIF-D</div><div class="mfv">${escapeHtml(r.sd) || '0'} KİŞİ</div></div>
    <div class="mf"><div class="mfl">RAPOR TARİHİ</div><div class="mfv">${escapeHtml(r.tarih)}</div></div>
    <div class="mf"><div class="mfl">// DENEY AMACI</div><div class="mfp">${escapeHtml(r.amac) || '—'}</div></div>
    <div class="mf"><div class="mfl">// DENEY SONUCU</div><div class="mfp">${escapeHtml(r.sonuc) || '—'}</div></div>`;
      if (r.timestamps?.length) {
        b += `<div class="mf"><div class="mfl">// ZAMAN DAMGALARI</div>`;
        r.timestamps.forEach(t => b += `<div class="mts"><span class="mts-t">[${escapeHtml(t.time) || '--:--:--'}]</span><span>${escapeHtml(t.note) || ''}</span></div>`);
        b += `</div>`;
      }
      b += `<div class="mf"><div class="mfl">// ANORMAL DURUMLAR</div><div class="mfp">${escapeHtml(r.ano) || 'Kayıt yok.'}</div></div>`;
      b += `<div class="mf"><div class="mfl">// EKLEMELERİM</div><div class="mfp">${escapeHtml(r.ek) || 'Kayıt yok.'}</div></div>`;
      // Onay durumu
      b += `<div class="mf"><div class="mfl">// ONAY DURUMU</div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:4px">
      ${onayDurumBadge(r.onayDurum)}
      ${r.onayYapan ? `<span style="font-size:10px;color:var(--text-dim)">— ${escapeHtml(r.onayYapan)} · ${escapeHtml(r.onayTarih)}</span>` : ''}
    </div>
    ${CU.role === 'yetkili' ? `<div class="onay-btn-grp">
      <button class="onay-btn onayla" onclick="onaylaRapor(${r.id})">[ ✓ ONAYLA ]</button>
      <button class="onay-btn reddet" onclick="reddetRapor(${r.id})">[ ✕ REDDET ]</button>
    </div>`: ''}
  </div>`;
      if (r.images?.length) {
        b += `<div class="mf"><div class="mfl">// GÖRSELLER</div><div class="mimgs">`;
        r.images.forEach(s => b += `<img src="${s}" class="mimg" onclick="openLb('${s}')" title="Büyütmek için tıkla"/>`);
        b += `</div></div>`;
      }
      document.getElementById('mbody').innerHTML = b;
      document.getElementById('mo').classList.add('active');
    }
    function openLb(src) {
      document.getElementById('lb-img').src = src;
      document.getElementById('lb').classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeLb() {
      document.getElementById('lb').classList.remove('active');
      document.getElementById('lb-img').src = '';
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb() });

    function onayDurumBadge(durum) {
      if (durum === 'onaylandi') return `<span class="onay-badge onay-onaylandi">✓ ONAYLANDI</span>`;
      if (durum === 'reddedildi') return `<span class="onay-badge onay-reddedildi">✕ REDDEDİLDİ</span>`;
      return `<span class="onay-badge onay-bekliyor">◎ ONAY BEKLİYOR</span>`;
    }

    async function onaylaRapor(id) {
      // GÜVENLİK: Sunucu tarafından rolü doğrula
      const yetkili = await verifyRole('yetkili');
      if (!yetkili) { alert('[GÜVENLİK] Bu işlem için yetkiniz yok.'); return; }
      const { error } = await _supabase.from('raporlar').update({
        onay_durum: 'onaylandi',
        onay_yapan: CU.displayName,
        onay_tarih: new Date().toLocaleString('tr-TR')
      }).eq('id', id);
      if (error) { console.error('[DB] Onay hatası:', error); return; }
      await loadRaps();
      openMo(id);
      document.getElementById('ca').innerHTML = CU.role === 'yetkili' ? (document.getElementById('nav-tum-raporlar')?.classList.contains('active') ? bTumRaporlar() : bDosyalar()) : bRaporlarim();
    }

    async function reddetRapor(id) {
      // GÜVENLİK: Sunucu tarafından rolü doğrula
      const yetkili = await verifyRole('yetkili');
      if (!yetkili) { alert('[GÜVENLİK] Bu işlem için yetkiniz yok.'); return; }
      const { error } = await _supabase.from('raporlar').update({
        onay_durum: 'reddedildi',
        onay_yapan: CU.displayName,
        onay_tarih: new Date().toLocaleString('tr-TR')
      }).eq('id', id);
      if (error) { console.error('[DB] Red hatası:', error); return; }
      await loadRaps();
      openMo(id);
      document.getElementById('ca').innerHTML = CU.role === 'yetkili' ? (document.getElementById('nav-tum-raporlar')?.classList.contains('active') ? bTumRaporlar() : bDosyalar()) : bRaporlarim();
    }

    let silPendingId = null, openModalId = null;

    function silFromModal() { if (openModalId) silRapor(openModalId) }

    function silRapor(id) {
      const r = getRaps().find(x => x.id === id); if (!r) return;
      // GÜVENLİK: Sadece rapor sahibi veya yetkili silebilir
      if (CU.role !== 'yetkili' && CU.username !== r.username) {
        alert('[GÜVENLİK] Bu raporu silme yetkiniz yok.');
        return;
      }
      silPendingId = id;
      document.getElementById('confirm-target').textContent = `${r.scd || '—'} // DENEY-${r.dNo || '000'} — ${r.displayName}`;
      document.getElementById('confirm-overlay').classList.add('active');
    }
    async function confirmSil() {
      if (!silPendingId) return;
      // GÜVENLİK: Silme öncesi sunucudan oturumu tekrar doğrula
      const valid = await verifyRole();
      if (!valid) return;
      const targetRap = getRaps().find(x => x.id === silPendingId);
      if (targetRap && CU.role !== 'yetkili' && CU.username !== targetRap.username) {
        alert('[GÜVENLİK] Bu raporu silme yetkiniz yok.');
        silPendingId = null;
        document.getElementById('confirm-overlay').classList.remove('active');
        return;
      }
      // Supabase'den sil
      const { error } = await _supabase.from('raporlar').delete().eq('id', silPendingId);
      if (error) { console.error('[DB] Silme hatası:', error); }
      await loadRaps(); // Cache'i güncelle
      silPendingId = null;
      document.getElementById('confirm-overlay').classList.remove('active');
      closeMoDirect();
      // sayfayı yenile
      const activeNav = document.querySelector('.sb-item.active');
      if (activeNav) {
        const id = activeNav.id.replace('nav-', '');
        if (id === 'dosyalar' && VF) { document.getElementById('ca').innerHTML = bDosyalar(); }
        else showPage(id);
      }
    }
    function cancelSil() {
      silPendingId = null;
      document.getElementById('confirm-overlay').classList.remove('active');
    }

    function closeMo(e) { if (e.target === document.getElementById('mo')) closeMoDirect() }
    function closeMoDirect() { document.getElementById('mo').classList.remove('active') }
  </script>
</body>

</html>
