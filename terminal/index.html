  <div id="toast-container" style="position:fixed;bottom:20px;right:20px;z-index:99999;display:flex;flex-direction:column;gap:10px;"></div>

  <script>
    // Simple Network Canvas Background for Terminal
    const canvas = document.getElementById('network-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];
    
    function initCanvas() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        particles = [];
        const numParticles = Math.min(Math.floor(width * height / 12000), 120);
        for(let i=0; i<numParticles; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.4,
                radius: Math.random() * 1.5 + 0.5,
                color: Math.random() > 0.8 ? 'rgba(255, 71, 71, 0.8)' : 'rgba(255, 255, 255, 0.4)'
            });
        }
    }
    
    function drawCanvas() {
        ctx.clearRect(0, 0, width, height);
        
        particles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            if(p.x < 0 || p.x > width) p.vx *= -1;
            if(p.y < 0 || p.y > height) p.vy *= -1;
            
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
        });
        
        for(let i=0; i<particles.length; i++) {
            for(let j=i+1; j<particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if(dist < 150) {
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.lineWidth = 1 - dist/150;
                    
                    if (particles[i].color === 'rgba(255, 71, 71, 0.8)' || particles[j].color === 'rgba(255, 71, 71, 0.8)') {
                        ctx.strokeStyle = `rgba(255, 71, 71, ${0.2 * (1 - dist/150)})`;
                    } else {
                        ctx.strokeStyle = `rgba(255, 255, 255, ${0.1 * (1 - dist/150)})`;
                    }
                    
                    ctx.stroke();
                }
            }
        }
        requestAnimationFrame(drawCanvas);
    }
    
    window.addEventListener('resize', initCanvas);
    initCanvas();
    drawCanvas();
  </script>
</body>
