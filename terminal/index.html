<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tesis-62 // Rapor Terminali</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="/terminal/assets/css/style.css" />
</head>
<body>
  <div class="scanline"></div><div class="build-ver" id="build-ver-badge"></div>
  <div id="init-loading" style="position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;z-index:99999;padding:20px;font-family:'VT323',monospace;color:var(--green)">
    <div style="font-size:28px;letter-spacing:4px;text-shadow:0 0 12px var(--green);margin-bottom:20px;">◈ TESİS-62 KERNEL v5.6.1 ◈</div>
    <div id="boot-text" style="font-size:16px;line-height:1.5;white-space:pre-wrap;text-align:left;width:100%;"></div>
    <div id="boot-cursor" style="width:10px;height:20px;background:var(--green);animation:blink 1s infinite;margin-top:5px;display:none;"></div>
  </div>
  <div class="main-screen" id="main-screen">
    <div class="hdr">
      <div class="hdr-top">
        <div class="hdr-logo"><button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button><div class="scp-badge">SCP</div><div><div class="hdr-t">TESİS-62 // BİLİM VE ARAŞTIRMA DEPARTMANI</div><div class="hdr-main">RAPOR TERMİNALİ v5.6.1</div></div></div>
        <div class="hdr-right"><div class="hdr-clock" id="hclock">--:--:--</div><button class="mesaj-bell-btn" onclick="toggleMesajKutusu()" title="Mesaj Kutusu"><span class="mesaj-bell-icon">✉</span><span class="mesaj-badge" id="mesaj-badge" style="display:none"></span></button>
        <div class="hdr-user"><span><span class="sdot"></span>BAĞLI:</span><span id="hun" style="color:var(--green)">—</span><span id="hrutbe" style="font-size:9px">—</span><button class="logout-btn" onclick="doLogout()">[ ÇIKIŞ ]</button></div></div>
      </div>
      <div class="hdr-status"><span><span class="sdot"></span>SİSTEM AKTİF</span><span><span class="sdot red"></span>GİZLİLİK: SEVİYE-4</span></div>
    </div>
    <div class="main-body"><div class="sidebar" id="sidebar"></div><div class="content" id="ca"></div></div>
  </div>
  <div class="mesaj-overlay" id="mesaj-overlay" onclick="closeMesajOnOutside(event)"><div class="mesaj-panel" id="mesaj-panel"><div class="mesaj-panel-hdr"><span class="mesaj-panel-title">◈ MESAJ KUTUSU</span><button class="mesaj-panel-close" onclick="closeMesajKutusu()">✕</button></div><div class="mesaj-panel-body" id="mesaj-panel-body"></div></div></div>
  <div class="mesaj-overlay" id="mesaj-detay-overlay" onclick="closeMesajDetayOnOutside(event)"><div class="mesaj-panel" id="mesaj-detay-panel"><div class="mesaj-panel-hdr"><span class="mesaj-panel-title">◈ MESAJ DETAYI</span><button class="mesaj-panel-close" onclick="closeMesajDetay()">✕</button></div><div class="mesaj-panel-body" id="mesaj-detay-body"></div></div></div>
  <div class="confirm-overlay" id="confirm-overlay"><div class="confirm-box"><div class="confirm-hdr"><div class="confirm-hdr-title">⚠ KAYIT SİLME İŞLEMİ</div></div><div class="confirm-body"><div class="confirm-warn">Bu kayıt kalıcı olarak silinecektir. Bu işlem geri alınamaz.</div><div class="confirm-target" id="confirm-target">—</div><div class="confirm-btns"><button class="confirm-evet" onclick="confirmSil()">[ EVET, SİL ]</button><button class="confirm-hayir" onclick="cancelSil()">[ İPTAL ]</button></div></div></div></div>
  <div class="lb" id="lb" onclick="closeLb()"><button class="lb-close" onclick="closeLb()">[ KAPAT ]</button><img id="lb-img" src="" alt="" /><div class="lb-hint">ESC veya tıkla — kapat</div></div>
  <div class="mo" id="mo" onclick="closeMo(event)"><div class="mb"><div class="mh"><div class="mt" id="mt">RAPOR DETAYI</div><div style="display:flex;gap:6px;align-items:center"><button class="sil-btn" id="mo-sil-btn" onclick="silFromModal()" style="font-size:10px">[ SİL ]</button><button class="mc" onclick="closeMoDirect()">[ KAPAT ]</button></div></div><div class="mbody" id="mbody"></div></div></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
<script src="/terminal/assets/js/effects.js"></script>
  <script src="/terminal/assets/js/app.js"></script>
<div id="toast-container" style="position:fixed;bottom:20px;right:20px;z-index:99999;display:flex;flex-direction:column;gap:10px;"></div>
</body>
</html>
